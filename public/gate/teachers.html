<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Access | Impact Learning Platform</title>
  <link rel="stylesheet" href="/css/teacher-gate.css">
</head>
<body>
  <main class="teacher-gate-page">
    <section class="teacher-gate-card">
      <div class="teacher-gate-label">Teacher Access</div>

      <h1>Welcome</h1>

      <form id="teacherGateForm" class="teacher-gate-form">
        <div class="teacher-gate-row">
          <input id="passkeyInput" type="password" autocomplete="off">
          <button id="togglePasskey" type="button">Show</button>
        </div>

        <button type="submit" class="teacher-gate-submit">Sign In</button>
        <p id="gateStatus" class="teacher-gate-status"></p>
      </form>
    </section>
  </main>

  <script type="module">
    import { validatePasskey } from "/js/passkey-auth.js";

    const form = document.getElementById("teacherGateForm");
    const input = document.getElementById("passkeyInput");
    const status = document.getElementById("gateStatus");
    const toggle = document.getElementById("togglePasskey");

    toggle.addEventListener("click", () => {
      input.type = input.type === "password" ? "text" : "password";
      toggle.textContent = input.type === "password" ? "Show" : "Hide";
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      status.textContent = "Checking access...";

      const result = await validatePasskey(input.value, "teacher");

      if (!result.ok) {
        status.textContent = result.message;
        return;
      }

      sessionStorage.setItem("impactTeacherAccess", "granted");
      sessionStorage.setItem("impactTeacherName", result.ownerName || "");
      window.location.href = "/teacher/dashboard.html";
    });
  </script>
</body>
</html>
