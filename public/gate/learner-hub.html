<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Learner Access | Impact</title>
<link href="https://fonts.googleapis.com/css2?family=Sorts+Mill+Goudy&family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/passkey-luxury.css">
<link rel="stylesheet" href="/css/impact-global-bg.css">
<link rel="stylesheet" href="/css/impact-round-icons.css?v=001">
</head>
<body>
<main class="access-page">
  <div class="bg-layer"></div>
  <div class="shade-layer"></div>

  <section class="access-card">
    <p class="small-title">LEARNER ACCESS</p>
    <h1>Welcome</h1>

    <div class="passkey-row">
      <input id="passkey" type="password" autocomplete="off">
      <button class="toggle-passkey" id="togglePasskey" type="button">👁</button>
    </div>

    <button id="signInBtn" type="button">Sign In</button>
    <p id="status" class="status"></p>
  </section>
</main>

<script type="module">
import { validatePasskey } from "/js/passkey-auth.js?v=learner-gate-fixed-001";

const input = document.getElementById("passkey");
const status = document.getElementById("status");
const button = document.getElementById("signInBtn");
const toggle = document.getElementById("togglePasskey");

toggle.addEventListener("click", () => {
  input.type = input.type === "password" ? "text" : "password";
});

async function login(){
  status.textContent = "Checking passkey...";

  try{
    const result = await validatePasskey(input.value, "learner");

    if(result.ok){
      sessionStorage.setItem("impactAccessRole", "learner");
      sessionStorage.setItem("impactAccessName", result.ownerName || "Learner");
      sessionStorage.setItem("impactLearnerName", result.ownerName || "Learner");
      window.location.href = "/learner/dashboard.html";
    }else{
      status.textContent = result.message;
    }
  }catch(e){
    console.error(e);
    status.textContent = "Could not verify passkey.";
  }
}

button.addEventListener("click", login);
input.addEventListener("keydown", e => {
  if(e.key === "Enter") login();
});
</script>
<script src="/js/impact-global-bg.js"></script>
<script src="/js/impact-round-icons.js?v=001"></script>
</body>
</html>
