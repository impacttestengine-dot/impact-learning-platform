<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Team Lead Gate | Impact</title>

<link href="https://fonts.googleapis.com/css2?family=Sorts+Mill+Goudy&family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/impact-global-bg.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  min-height:100vh;
  background:#05060b;
  color:#fff;
  font-family:Inter,system-ui,sans-serif;
}

.page{
  position:relative;
  z-index:2;
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:30px;
}

.card{
  width:min(520px,92vw);
  padding:38px;
  border-radius:34px;
  background:rgba(8,12,24,.72);
  border:1px solid rgba(255,255,255,.14);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  box-shadow:0 30px 90px rgba(0,0,0,.42);
}

h1{
  font-family:"Sorts Mill Goudy",Georgia,serif;
  font-size:clamp(2.6rem,5vw,4rem);
  font-weight:400;
  margin-bottom:22px;
}

label{
  display:block;
  margin-bottom:8px;
  font-weight:900;
  color:rgba(255,255,255,.8);
}

input{
  width:100%;
  min-height:56px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.10);
  color:#fff;
  padding:14px 16px;
  font:inherit;
  font-weight:800;
  outline:none;
}

button{
  width:100%;
  min-height:56px;
  margin-top:18px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.18);
  background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(255,255,255,.08));
  color:#fff;
  font:inherit;
  font-weight:900;
  cursor:pointer;
}

#error{
  display:none;
  margin-top:14px;
  color:#fecaca;
  font-weight:900;
}
</style>
<link rel="stylesheet" href="/css/impact-round-icons.css?v=001">
</head>

<body>
<main class="page">
  <section class="card">
    <h1>Team Lead Access</h1>

    <label>Master Passkey</label>
    <input id="passkey" type="password" placeholder="Enter master passkey">

    <button id="enterBtn" type="button">Enter</button>
    <p id="error">Incorrect passkey.</p>
  </section>
</main>

<script src="/js/impact-global-bg.js"></script>

<script>
(function(){
  const MASTER_KEY = "IMP-ZXJ$453-AM";

  document.getElementById("enterBtn").onclick = function(){
    const value = document.getElementById("passkey").value.trim();

    if(value === MASTER_KEY){
      sessionStorage.setItem("impactTeamLeadAccess","granted");
      sessionStorage.setItem("impactJustSignedIn","1"); window.location.href = "/teacher/team-lead-dashboard.html";
      return;
    }

    document.getElementById("error").style.display = "block";
  };
})();
</script>
<script src="/js/impact-round-icons.js?v=001"></script>
<script src="/js/impact-recycle-bin.js"></script>
</body>
</html>
