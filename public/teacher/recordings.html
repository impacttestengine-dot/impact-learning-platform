<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recordings | Impact Learning Platform</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/personnel-dashboard.css">
  <link rel="stylesheet" href="/css/personnel-system.css">
</head>
<body>
  <main class="personnel-page recordings-page">
    <a class="home-link" href="/personnel/dashboard.html">Dashboard</a>

    <section class="personnel-hero recordings-hero">
      <div class="eyebrow">personnel Workspace</div>
      <h1>Recordings</h1>
    </section>

    <section class="recordings-shell">
      <aside class="recordings-folder-panel">
        <h2>Level Folders</h2>
        <p>Select a level to view or upload class recordings.</p>
        <div id="levelFolders" class="level-folder-grid"></div>
      </aside>

      <section class="recordings-content-panel">
        <div class="recordings-content-head">
          <div>
            <p class="class-card-label">Selected Folder</p>
            <h2 id="selectedLevelTitle">Absolute Beginner</h2>
          </div>
          <span id="recordingCount">0 recordings</span>
        </div>

        <form id="recordingForm" class="recording-upload-card">
          <h3>Upload Recording</h3>

          <div class="recording-form-grid">
            <label>
              Recording Title
              <input id="title" type="text">
            </label>

            <label>
              impactLearners / Group
              <input id="impactLearnersGroup" type="text">
            </label>

            <label>
              personnel
              <input id="personnel" type="text">
            </label>

            <label class="file-upload-field">
              Upload Video / Audio
              <input id="recordingFile" type="file" accept="video/*,audio/*">
            </label>
          </div>

          <label class="full-field">
            Notes
            <textarea id="notes" rows="4"></textarea>
          </label>

          <button class="start-class-button" type="submit">Upload Recording</button>
          <input type="hidden" id="level" value="Absolute Beginner">
        </form>

        <div id="recordingList" class="recording-list-grid">
          <div class="empty-state">Loading recordings...</div>
        </div>
      </section>
    </section>
  </main>

  <script type="module" src="/js/recordings.js"></script>
</body>
</html>
