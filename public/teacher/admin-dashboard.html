<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>
<style>
body{
  background:#160f0c;
  color:#fff;
  font-family:Inter;
  padding:30px;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}
.card{
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,.08);
}
button{
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}
</style>
<link rel="stylesheet" href="/css/impact-round-icons.css?v=001">
</head>
<body>

<h2>Admin Control</h2>

<div class="grid">

<div class="card">
<h3>Passkeys</h3>
<div id="keys"></div>
</div>

<div class="card">
<h3>Usage</h3>
<div id="usage"></div>
</div>

</div>

<script>
let keys = JSON.parse(localStorage.getItem("impact_keys") || "[]");
let usage = JSON.parse(localStorage.getItem("impact_usage") || "[]");

function render(){
  document.getElementById("keys").innerHTML =
    keys.map((k,i)=>
      <div>
         ()
        <button onclick="deactivate()">Deactivate</button>
      </div>
    ).join("");

  document.getElementById("usage").innerHTML =
    usage.map(u=>
      <div>
         -  - 
      </div>
    ).join("");
}

function deactivate(i){
  keys[i].active = false;
  localStorage.setItem("impact_keys", JSON.stringify(keys));
  render();
}

render();
</script>

<script src="/js/impact-task-menu-patch.js"></script><script src="/js/impact-round-icons.js?v=001"></script>
<script src="/js/impact-recycle-bin.js"></script>

<script id="team-meetings-menu-fix">
(function(){

  function injectTeamMeetings(){

    const menu =
      document.querySelector(".quick-menu") ||
      document.querySelector(".menu-dropdown") ||
      document.querySelector(".menu-panel") ||
      document.querySelector(".menu-links") ||
      document.querySelector(".dropdown-menu");

    if(!menu) return;

    if(document.getElementById("teamMeetingsMenuLink")) return;

    const recycleLink = Array.from(menu.querySelectorAll("a"))
      .find(a =>
        (a.textContent || "")
          .toLowerCase()
          .includes("recycle")
      );

    if(!recycleLink) return;

    const newLink = recycleLink.cloneNode(true);

    newLink.id = "teamMeetingsMenuLink";

    newLink.href = "/teacher/team-meetings.html";

    newLink.textContent = "Team Meetings";

    // REMOVE INLINE STYLES THAT CAUSED STATIC LOOK
    newLink.removeAttribute("style");

    // insert before recycle bin
    recycleLink.parentNode.insertBefore(newLink, recycleLink);

  }

  injectTeamMeetings();

  setInterval(injectTeamMeetings, 1500);

})();
</script>

<script src="/js/impact-route-guard.js?v=inactivity-1hr"></script>
</body>
</html>
