<body>
<div class="config-nav">
  <button type="button" onclick="window.location.href='/teacher/dashboard.html'">Dashboard</button>
  <button type="button" onclick="history.back()">Back</button>
</div>
<main class="page">
  <section class="card">
    <h1>Create Team Passkey</h1>

    <div class="field">
      <label>Team Member Name</label>
      <input id="memberName" type="text" placeholder="Team Member Name">
    </div>

    <div class="field">
      <label>Role</label>
      <select id="role">
  <option value="Teacher">Teacher</option>
  <option value="Operations">Operations</option>
  <option value="Academic Team lead">Academic Team lead</option>
  <option value="Impact Team lead">Impact Team lead</option>
</select>
    </div>

    <div class="field">
      <label>Status</label>
      <select id="status">
        <option value="active">Active</option>
      </select>
    </div>

    <button id="generateBtn" type="button">Generate Passkey</button>

    <div id="result"></div>
  </section>
</main>

<button class="team-lead-settings" id="teamLeadSettingsBtn" type="button">⚙</button>

<script src="/js/impact-global-bg.js"></script>

<script>
(function(){
  const result = document.getElementById("result");

  function makeKey(){
    const a = Math.random().toString(36).slice(2,5).toUpperCase();
    const b = Math.random().toString(36).slice(2,5).toUpperCase();
    return "IMP-" + a + "-" + b;
  }

  document.getElementById("generateBtn").onclick = async function(){
    const name = document.getElementById("memberName").value.trim();
    const role = document.getElementById("role").value;
    const status = document.getElementById("status").value;
    const passkey = makeKey();

    const item = {
      id:"PK-" + Date.now(),
      name:name || "Unnamed",
      role,
      passkey,
      status,
      createdAt:new Date().toISOString()
    };

    const list = JSON.parse(localStorage.getItem("impactPasskeys") || "[]");
    list.push(item);
    localStorage.setItem("impactPasskeys", JSON.stringify(list));

    try{
      if(window.firebase && firebase.apps && firebase.apps.length && firebase.firestore){
        const db = firebase.firestore();

        const existing = await db.collection("impactPasskeys")
          .where("passkey","==",passkey)
          .limit(1)
          .get();

        if(existing.empty){
          await db.collection("impactPasskeys").add({
            name:item.name,
            role:item.role,
            passkey:item.passkey,
            status:item.status,
            createdAt:item.createdAt
          });
        }
      }
    }catch(e){
      console.warn("Firestore save failed. Local backup saved.", e);
    }

    result.style.display = "block";
    result.textContent = "Passkey created for " + item.name + ": " + passkey;
  };

  document.getElementById("teamLeadSettingsBtn").onclick = function(){
    window.location.href = "/gate/team-lead.html";
  };
})();
</script>

<script id="team-meetings-menu-fix">
(function(){

  function injectTeamMeetings(){

    const menu =
      document.querySelector(".quick-menu") ||
      document.querySelector(".menu-dropdown") ||
      document.querySelector(".menu-panel") ||
      document.querySelector(".menu-links") ||
      document.querySelector(".dropdown-menu");

    if(!menu) return;

    if(document.getElementById("teamMeetingsMenuLink")) return;

    const recycleLink = Array.from(menu.querySelectorAll("a"))
      .find(a =>
        (a.textContent || "")
          .toLowerCase()
          .includes("recycle")
      );

    if(!recycleLink) return;

    const newLink = recycleLink.cloneNode(true);

    newLink.id = "teamMeetingsMenuLink";

    newLink.href = "/teacher/team-meetings.html";

    newLink.textContent = "Team Meetings";

    // REMOVE INLINE STYLES THAT CAUSED STATIC LOOK
    newLink.removeAttribute("style");

    // insert before recycle bin
    recycleLink.parentNode.insertBefore(newLink, recycleLink);

  }

  injectTeamMeetings();

  setInterval(injectTeamMeetings, 1500);

})();
</script>
