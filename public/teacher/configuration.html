<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Configuration</title>

<style>
body{
  background:#0f172a;
  font-family:Inter, sans-serif;
  color:white;
}

.card{
  width:400px;
  margin:100px auto;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
}

input, select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  margin-top:20px;
  border-radius:10px;
  background:#2563eb;
  color:white;
  border:none;
  cursor:pointer;
}

.settings-icon{
  position:fixed;
  bottom:30px;
  right:30px;
  font-size:26px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
<h2>Create Team Passkey</h2>

<input id="name" placeholder="Team Member Name">
<select id="role">
  <option value="teacher">Teacher</option>
</select>

<select id="status">
  <option value="active">Active</option>
</select>

<button onclick="createPasskey()">Generate Passkey</button>
</div>

<div class="settings-icon" onclick="openAdmin()">⚙️</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { firebaseConfig } from "../js/firebase-config.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.createPasskey = async () => {
  const name = document.getElementById("name").value;

  const key = "IMP-" + Math.random().toString(36).substring(2,8).toUpperCase();

  await addDoc(collection(db,"passkeys"),{
    name,
    role:"teacher",
    key,
    status:"active",
    created:Date.now()
  });

  alert("Passkey created: " + key);
};

window.openAdmin = () => {
  const input = prompt("Enter master passkey");

  if(input === "IMP-ZXJ-AM"){
    window.location.href = "/teacher/admin.html";
  } else {
    alert("Access denied");
  }
};
</script>

</body>
</html>
