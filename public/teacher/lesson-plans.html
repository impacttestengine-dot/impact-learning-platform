<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Lesson Plans | Impact</title>
<link href="https://fonts.googleapis.com/css2?family=Sorts+Mill+Goudy&family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/impact-global-bg.css">
<link rel="stylesheet" href="/css/impact-page-nav.css">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,sans-serif;color:#fff;background:#05060b;min-height:100vh}
.page{position:relative;z-index:2;width:min(1120px,92vw);margin:0 auto;padding:118px 0 80px}
.hero{text-align:center;margin-bottom:34px}
.eyebrow{text-transform:uppercase;letter-spacing:.34em;font-size:.68rem;font-weight:900;color:rgba(235,240,255,.62);margin-bottom:12px}
h1{font-family:"Sorts Mill Goudy",Georgia,serif;font-size:clamp(3rem,6vw,5.2rem);font-weight:400;line-height:1}
.hero p{margin-top:12px;color:rgba(255,255,255,.68);font-weight:700}
.level-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:20px}
.level-card{min-height:142px;padding:20px;border-radius:28px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(20px);box-shadow:0 24px 70px rgba(0,0,0,.26),inset 0 1px 0 rgba(255,255,255,.09);cursor:pointer;transition:all .28s ease}
.level-card:hover{transform:translateY(-3px);background:rgba(255,255,255,.105);border-color:rgba(232,216,166,.34)}
.level-card h2{font-family:"Sorts Mill Goudy",Georgia,serif;font-size:1.75rem;font-weight:400;margin-bottom:12px}
.level-card p{color:rgba(255,255,255,.66);font-size:.82rem;font-weight:800}
.level-grid.folder-focus-active .level-card{filter:blur(3px) brightness(.45);opacity:.42}
.level-grid.folder-focus-active .level-card.open{filter:none;opacity:1;transform:scale(1.015);z-index:5}
.file-list{max-height:0;overflow:hidden;margin-top:0;display:grid;gap:10px;opacity:0;transition:max-height .45s ease,opacity .25s ease,margin-top .35s ease}
.level-card.open .file-list{max-height:380px;overflow-y:auto;margin-top:16px;opacity:1}
.lesson-file-row{display:grid;grid-template-columns:1fr auto auto auto;gap:8px;align-items:center;padding:8px;border-radius:16px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.07)}
.file-pill,.lesson-action-btn,.lesson-delete-btn,.create-btn{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);color:#fff;border-radius:14px;padding:10px 12px;font-weight:400;cursor:pointer;transition:transform .18s ease,background .18s ease,border-color .18s ease,box-shadow .18s ease}
.file-pill{text-align:left;width:100%;line-height:1.35}
.lesson-action-btn:hover{transform:translateY(-2px) scale(1.04);background:rgba(255,255,255,.16);border-color:rgba(232,216,166,.38);box-shadow:0 12px 28px rgba(0,0,0,.28)}
.lesson-delete-btn{border-color:rgba(255,120,120,.28);background:rgba(255,80,80,.12)}
.lesson-delete-btn:hover{transform:translateY(-2px) scale(1.04);background:rgba(255,80,80,.24);border-color:rgba(255,120,120,.5);box-shadow:0 12px 28px rgba(255,80,80,.16)}
.lesson-action-btn:active,.lesson-delete-btn:active{transform:scale(.96)}
.footer{margin-top:30px;display:flex;justify-content:center}
.create-btn{min-width:230px;min-height:50px;font-weight:900}

.impact-confirm-backdrop{position:fixed;inset:0;z-index:99999;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.48);backdrop-filter:blur(14px)}
.impact-confirm-backdrop.show{display:flex}
.impact-confirm-card{width:min(420px,90vw);border-radius:28px;padding:28px;background:rgba(20,24,38,.9);border:1px solid rgba(255,255,255,.16);box-shadow:0 30px 90px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.12);text-align:center}
.impact-confirm-card h3{font-family:"Sorts Mill Goudy",Georgia,serif;font-size:2rem;font-weight:400;margin-bottom:10px}
.impact-confirm-card p{color:rgba(255,255,255,.72);font-weight:600;line-height:1.5;margin-bottom:22px}
.impact-confirm-actions{display:flex;gap:12px;justify-content:center}
.impact-confirm-actions button{min-width:110px;border-radius:16px;padding:12px 16px;cursor:pointer;font-weight:800;color:#fff;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.1)}
.impact-confirm-actions .danger{border-color:rgba(255,120,120,.35);background:rgba(255,80,80,.18)}

@media(max-width:900px){.level-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:620px){.level-grid{grid-template-columns:1fr}.page{padding-top:112px}.lesson-file-row{grid-template-columns:1fr}}
</style>
<link rel="stylesheet" href="/css/impact-round-icons.css?v=001">
</head>

<body>
<main class="page">
  <section class="hero">
    <p class="eyebrow">Teacher Workspace</p>
    <h1>Lesson Plans</h1>
    <p>Open a level folder to view saved lesson plans, or create a new one.</p>
  </section>

  <section class="level-grid" id="levelGrid"></section>

  <div class="footer">
    <button class="create-btn" id="createBtn" type="button">Create Lesson Plan</button>
  </div>
</main>

<div class="impact-confirm-backdrop" id="impactConfirmModal">
  <div class="impact-confirm-card">
    <h3>Delete template?</h3>
    <p id="impactConfirmMessage">This will remove the template from this folder.</p>
    <div class="impact-confirm-actions">
      <button type="button" id="impactConfirmCancel">Cancel</button>
      <button type="button" class="danger" id="impactConfirmOk">Delete</button>
    </div>
  </div>
</div>

<script src="/js/impact-global-bg.js"></script>
<script src="/js/impact-page-nav.js"></script>
<script src="/js/impact-firebase-store.js?v=firebase-final-001"></script>

<script>
(async function(){
  const levels=["Absolute Beginner","A0","A1","A1.1","A2","B1","B2"];
  const grid=document.getElementById("levelGrid");
  const createBtn=document.getElementById("createBtn");

  const templateBase=[
    {key:"speaking-starter",title:"Template 1 — Speaking Starter",objective:"Learners practise simple oral production from the first minutes of class.",flow:"Warm-up → teacher model → repetition → guided speaking → independent speaking → quick correction.",materials:"Speaking prompts, name cards, simple question frames."},
    {key:"vocabulary-builder",title:"Template 2 — Vocabulary Builder",objective:"Learners use new vocabulary confidently in short spoken sentences.",flow:"Picture prompt → vocabulary drilling → sentence building → oral practice → mini performance check.",materials:"Picture cards, vocabulary list, sentence frames."},
    {key:"assessment-prep",title:"Template 3 — Assessment Prep",objective:"Learners review weak areas and practise assessment-style tasks.",flow:"Quick diagnostic → correction → guided practice → individual attempt → feedback.",materials:"Review worksheet, assessment prompts, correction notes."}
  ];

  function impactConfirm(message){
    return new Promise(resolve=>{
      const modal=document.getElementById("impactConfirmModal");
      const msg=document.getElementById("impactConfirmMessage");
      const ok=document.getElementById("impactConfirmOk");
      const cancel=document.getElementById("impactConfirmCancel");

      msg.textContent=message;
      modal.classList.add("show");

      const close=(result)=>{
        modal.classList.remove("show");
        ok.onclick=null;
        cancel.onclick=null;
        modal.onclick=null;
        resolve(result);
      };

      ok.onclick=()=>close(true);
      cancel.onclick=()=>close(false);
      modal.onclick=(e)=>{ if(e.target===modal) close(false); };
    });
  }

  function deletedTemplates(){
    try{return JSON.parse(localStorage.getItem("impactDeletedLessonTemplates")||"[]")}
    catch(e){return []}
  }

  function saveDeletedTemplate(id){
    const deleted=deletedTemplates();
    deleted.push(id);
    localStorage.setItem("impactDeletedLessonTemplates",JSON.stringify([...new Set(deleted)]));
  }

  function templatePlansFor(level){
    const deleted=deletedTemplates();
    return templateBase.map(t=>({
      id:`template-${level.replace(/\s+/g,"-").replace(/\./g,"-").toLowerCase()}-${t.key}`,
      level,
      title:t.title,
      type:"template",
      isTemplate:true,
      objective:t.objective,
      flow:t.flow,
      materials:t.materials
    })).filter(t=>!deleted.includes(t.id));
  }

  async function safeGetPlans(){
    try{return await window.ImpactFirebaseStore.getLessonPlans()}
    catch(e){console.warn(e);return []}
  }

  async function render(){
    const savedPlans=await safeGetPlans();

    grid.innerHTML=levels.map(level=>{
      const files=[...templatePlansFor(level),...savedPlans.filter(p=>p.level===level)];
      const fileHtml=files.map(file=>`
        <div class="lesson-file-row">
          <button class="file-pill" data-id="${file.id}" data-template="${file.isTemplate ? "yes" : "no"}" type="button">${file.title || file.name || "Untitled Lesson"}</button>
          <button class="lesson-action-btn lesson-view-btn" data-id="${file.id}" data-template="${file.isTemplate ? "yes" : "no"}" type="button">🔎</button>
          <button class="lesson-action-btn lesson-edit-btn" data-id="${file.id}" data-template="${file.isTemplate ? "yes" : "no"}" type="button">✍🏽</button>
          <button class="lesson-delete-btn" data-id="${file.id}" data-template="${file.isTemplate ? "yes" : "no"}" type="button">❌</button>
        </div>`).join("");

      return `<article class="level-card" data-level="${level}">
        <h2>${level}</h2>
        <p>${files.length} lesson plan${files.length===1?"":"s"}</p>
        <div class="file-list">${fileHtml}</div>
      </article>`;
    }).join("");
  }

  grid.addEventListener("click",async e=>{
    const deleteBtn=e.target.closest(".lesson-delete-btn");
    const viewBtn=e.target.closest(".lesson-view-btn,.file-pill");
    const editBtn=e.target.closest(".lesson-edit-btn");
    const card=e.target.closest(".level-card");

    if(deleteBtn){
      e.preventDefault();
      e.stopPropagation();

      const id=deleteBtn.dataset.id;
      const isTemplate=deleteBtn.dataset.template==="yes";

      if(isTemplate){
        const ok=await impactConfirm("Delete this template from the folder?");
        if(!ok) return;
        saveDeletedTemplate(id);
        await render();
        return;
      }

      const ok=await impactConfirm("Delete this lesson plan?");
      if(!ok) return;
      await window.ImpactFirebaseStore.deleteLessonPlan(id);
      await render();
      return;
    }

    if(viewBtn){
      e.preventDefault();
      e.stopPropagation();
      const row=viewBtn.closest(".lesson-file-row");
      const id=viewBtn.dataset.id;
      const level=viewBtn.closest(".level-card").dataset.level;
      const template=templatePlansFor(level).find(t=>t.id===id);
      const selected=template || {id,title:row.querySelector(".file-pill").textContent.trim(),level,type:"saved"};
      localStorage.setItem("impactSelectedLessonPlan",JSON.stringify(selected));
      sessionStorage.setItem("impactEditingLessonId",id);
      location.href="/teacher/lesson-plan-view.html?id="+encodeURIComponent(id);
      return;
    }

    if(editBtn){
      e.preventDefault();
      e.stopPropagation();
      const row=editBtn.closest(".lesson-file-row");
      const id=editBtn.dataset.id;
      const level=editBtn.closest(".level-card").dataset.level;
      const template=templatePlansFor(level).find(t=>t.id===id);
      const selected=template || {id,title:row.querySelector(".file-pill").textContent.trim(),level,type:"saved"};
      localStorage.setItem("impactSelectedLessonPlan",JSON.stringify(selected));
      sessionStorage.setItem("impactEditingLessonId",id);
      location.href="/teacher/lesson-builder.html?edit="+encodeURIComponent(id);
      return;
    }

    if(card){
      document.querySelectorAll(".level-card").forEach(c=>{if(c!==card)c.classList.remove("open")});
      card.classList.toggle("open");
      grid.classList.toggle("folder-focus-active",!!document.querySelector(".level-card.open"));
      sessionStorage.setItem("impactSelectedLessonLevel",card.dataset.level);
    }
  });

  document.addEventListener("click",e=>{
    if(e.target.closest(".level-card") || e.target.closest(".create-btn") || e.target.closest(".impact-confirm-card")) return;
    document.querySelectorAll(".level-card.open").forEach(card=>card.classList.remove("open"));
    grid.classList.remove("folder-focus-active");
  });

  createBtn.onclick=()=>{
    const selected=sessionStorage.getItem("impactSelectedLessonLevel") || "Absolute Beginner";
    location.href="/teacher/lesson-builder.html?level="+encodeURIComponent(selected);
  };

  await render();
})();
</script>
<script src="/js/impact-round-icons.js?v=001"></script>
<script src="/js/impact-recycle-bin.js"></script>


<script id="team-meetings-menu-fix">
(function(){

  function injectTeamMeetings(){

    const menu =
      document.querySelector(".quick-menu") ||
      document.querySelector(".menu-dropdown") ||
      document.querySelector(".menu-panel") ||
      document.querySelector(".menu-links") ||
      document.querySelector(".dropdown-menu");

    if(!menu) return;

    if(document.getElementById("teamMeetingsMenuLink")) return;

    const recycleLink = Array.from(menu.querySelectorAll("a"))
      .find(a =>
        (a.textContent || "")
          .toLowerCase()
          .includes("recycle")
      );

    if(!recycleLink) return;

    const newLink = recycleLink.cloneNode(true);

    newLink.id = "teamMeetingsMenuLink";

    newLink.href = "/teacher/team-meetings.html";

    newLink.textContent = "Team Meetings";

    // REMOVE INLINE STYLES THAT CAUSED STATIC LOOK
    newLink.removeAttribute("style");

    // insert before recycle bin
    recycleLink.parentNode.insertBefore(newLink, recycleLink);

  }

  injectTeamMeetings();

  setInterval(injectTeamMeetings, 1500);

})();
</script>


<script id="lesson-plan-delete-fix">
document.addEventListener("DOMContentLoaded", function(){

  function getDb(){
    if(window.firebase && firebase.firestore){
      return firebase.firestore();
    }
    return null;
  }

  document.addEventListener("click", async function(e){

    const btn = e.target.closest(
      "[data-delete-id], [data-delete], .delete-plan, .delete-btn, .plan-delete-btn, button"
    );

    if(!btn) return;

    const label = (btn.textContent || "").trim().toLowerCase();
    const looksLikeDelete =
      label.includes("delete") ||
      label === "×" ||
      label === "x" ||
      btn.classList.contains("delete-plan") ||
      btn.classList.contains("delete-btn") ||
      btn.classList.contains("plan-delete-btn") ||
      btn.hasAttribute("data-delete") ||
      btn.hasAttribute("data-delete-id");

    if(!looksLikeDelete) return;

    e.preventDefault();
    e.stopPropagation();

    const row =
      btn.closest("[data-id]") ||
      btn.closest("[data-plan-id]") ||
      btn.closest(".lesson-plan-row") ||
      btn.closest(".lesson-plan-item") ||
      btn.closest(".plan-row") ||
      btn.closest(".saved-plan") ||
      btn.closest(".folder-plan") ||
      btn.closest("article") ||
      btn.closest("li") ||
      btn.closest(".card");

    const id =
      btn.dataset.deleteId ||
      btn.dataset.delete ||
      btn.dataset.id ||
      row?.dataset?.id ||
      row?.dataset?.planId;

    if(!id){
      alert("Could not find this lesson plan ID.");
      return;
    }

    if(!confirm("Delete this lesson plan?")) return;

    try{
      const db = getDb();

      if(db){
        const collections = [
          "lessonPlans",
          "lessons",
          "savedLessonPlans"
        ];

        for(const name of collections){
          try{
            await db.collection(name).doc(id).delete();
          }catch(err){}
        }
      }

      // Also remove from localStorage backup if the page uses local saved plans
      const keys = [
        "impactLessonPlans",
        "impactSavedLessonPlans",
        "lessonPlans"
      ];

      keys.forEach(key => {
        try{
          const list = JSON.parse(localStorage.getItem(key) || "[]");
          if(Array.isArray(list)){
            const next = list.filter(item => item.id !== id && item.planId !== id);
            localStorage.setItem(key, JSON.stringify(next));
          }
        }catch(err){}
      });

      if(row){
        row.remove();
      }else{
        window.location.reload();
      }

    }catch(err){
      console.error(err);
      alert("Delete failed. Check console for details.");
    }

  }, true);

});
</script>

</body>
</html>
