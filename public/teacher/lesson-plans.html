<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Lesson Plans | Impact</title>
<link href="https://fonts.googleapis.com/css2?family=Sorts+Mill+Goudy&family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/impact-global-bg.css">
<link rel="stylesheet" href="/css/impact-page-nav.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,sans-serif;color:#fff;background:#05060b;min-height:100vh}
.page{position:relative;z-index:2;width:min(1120px,92vw);margin:0 auto;padding:118px 0 80px}
.hero{text-align:center;margin-bottom:34px}
.eyebrow{text-transform:uppercase;letter-spacing:.34em;font-size:.68rem;font-weight:900;color:rgba(235,240,255,.62);margin-bottom:12px}
h1{font-family:"Sorts Mill Goudy",Georgia,serif;font-size:clamp(3rem,6vw,5.2rem);font-weight:400;line-height:1}
.hero p{margin-top:12px;color:rgba(255,255,255,.68);font-weight:700}
.level-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:20px}
.level-card{min-height:142px;padding:20px;border-radius:28px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(20px);box-shadow:0 24px 70px rgba(0,0,0,.26),inset 0 1px 0 rgba(255,255,255,.09);cursor:pointer}
.level-card:hover{transform:translateY(-3px);background:rgba(255,255,255,.105);border-color:rgba(232,216,166,.34)}
.level-card h2{font-family:"Sorts Mill Goudy",Georgia,serif;font-size:1.75rem;font-weight:400;margin-bottom:12px}
.level-card p{color:rgba(255,255,255,.66);font-size:.82rem;font-weight:800}
.file-list{display:none;margin-top:16px;gap:8px}
.level-card.open .file-list{display:grid}
.lesson-file-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}
.file-pill,.lesson-delete-btn,.create-btn{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);color:#fff;border-radius:14px;padding:10px 12px;font-weight:900;cursor:pointer}
.file-pill{text-align:left;width:100%}
.lesson-delete-btn{border-color:rgba(255,120,120,.28);background:rgba(255,80,80,.12)}
.empty-note{padding:10px 12px;border-radius:14px;background:rgba(255,255,255,.055);color:rgba(255,255,255,.58);font-size:.78rem;font-weight:800}
.footer{margin-top:30px;display:flex;justify-content:center}
.create-btn{min-width:230px;min-height:50px}
@media(max-width:900px){.level-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:620px){.level-grid{grid-template-columns:1fr}.page{padding-top:112px}}
</style>
</head>
<body>
<main class="page">
  <section class="hero">
    <p class="eyebrow">Teacher Workspace</p>
    <h1>Lesson Plans</h1>
    <p>Open a level folder to view saved lesson plans, or create a new one.</p>
  </section>
  <section class="level-grid" id="levelGrid"></section>
  <div class="footer"><button class="create-btn" id="createBtn" type="button">Create Lesson Plan</button></div>
</main>

<script src="/js/impact-global-bg.js"></script>
<script src="/js/impact-page-nav.js"></script>
<script src="/js/impact-firebase-store.js?v=firebase-final-001"></script>
<script>
(async function(){
  const levels=["Absolute Beginner","A0","A1","A1.1","A2","B1","B2"];
  const grid=document.getElementById("levelGrid");
  const createBtn=document.getElementById("createBtn");

  async function render(){
    const plans=await window.ImpactFirebaseStore.getLessonPlans();

    grid.innerHTML=levels.map(level=>{
      const files=plans.filter(p=>p.level===level);
      const fileHtml=files.length
        ? files.map(file=>`
          <div class="lesson-file-row">
            <button class="file-pill" data-id="${file.id}" type="button">${file.title || file.name || "Untitled Lesson"}</button>
            <button class="lesson-delete-btn" data-delete-id="${file.id}" type="button">Delete</button>
          </div>`).join("")
        : `<div class="empty-note">No lesson plans saved yet.</div>`;

      return `<article class="level-card" data-level="${level}">
        <h2>${level}</h2>
        <p>${files.length} lesson plan${files.length===1?"":"s"}</p>
        <div class="file-list">${fileHtml}</div>
      </article>`;
    }).join("");

    document.querySelectorAll(".level-card").forEach(card=>{
      card.onclick=e=>{
        if(e.target.closest("button")) return;
        document.querySelectorAll(".level-card").forEach(c=>{if(c!==card)c.classList.remove("open")});
        card.classList.toggle("open");
        sessionStorage.setItem("impactSelectedLessonLevel",card.dataset.level);
      };
    });

    document.querySelectorAll(".file-pill").forEach(btn=>{
      btn.onclick=e=>{
        e.stopPropagation();
        sessionStorage.setItem("impactEditingLessonId",btn.dataset.id);
        location.href="/teacher/lesson-builder.html?edit="+encodeURIComponent(btn.dataset.id);
      };
    });

    document.querySelectorAll(".lesson-delete-btn").forEach(btn=>{
      btn.onclick=async e=>{
        e.stopPropagation();
        if(!confirm("Delete this lesson plan?")) return;
        await window.ImpactFirebaseStore.deleteLessonPlan(btn.dataset.deleteId);
        await render();
      };
    });
  }

  createBtn.onclick=()=>{
    const selected=sessionStorage.getItem("impactSelectedLessonLevel") || "Absolute Beginner";
    location.href="/teacher/lesson-builder.html?level="+encodeURIComponent(selected);
  };

  await render();
})();
</script>
<style id="lesson-folder-rollout-style">
  .lesson-rollout-panel{
    max-height:0;
    overflow:hidden;
    opacity:0;
    transition:max-height .45s ease, opacity .25s ease, margin-top .35s ease;
    margin-top:0;
  }

  .lesson-folder-open .lesson-rollout-panel{
    max-height:360px;
    opacity:1;
    margin-top:18px;
  }

  .lesson-rollout-inner{
    max-height:310px;
    overflow-y:auto;
    padding:14px;
    border-radius:22px;
    background:rgba(255,255,255,.07);
    border:1px solid rgba(255,255,255,.12);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
  }

  .lesson-rollout-row{
    display:grid;
    grid-template-columns:1fr auto auto auto;
    gap:10px;
    align-items:center;
    padding:12px 4px;
    border-bottom:1px solid rgba(255,255,255,.09);
  }

  .lesson-rollout-row:last-child{
    border-bottom:0;
  }

  .lesson-rollout-title{
    font-size:.88rem;
    font-weight:650;
    color:rgba(255,255,255,.9);
    line-height:1.35;
  }

  .lesson-rollout-action{
    border:1px solid rgba(255,255,255,.14);
    background:rgba(255,255,255,.08);
    color:#fff;
    border-radius:12px;
    padding:8px 11px;
    font-size:.74rem;
    font-weight:800;
    cursor:pointer;
  }

  .lesson-rollout-action.delete{
    background:rgba(239,68,68,.14);
    border-color:rgba(239,68,68,.35);
  }

  .lesson-rollout-empty{
    padding:16px;
    color:rgba(255,255,255,.62);
    font-weight:700;
    font-size:.85rem;
  }

  @media(max-width:700px){
    .lesson-rollout-row{
      grid-template-columns:1fr;
    }
  }
</style>

<script id="lesson-folder-rollout-script">
(function(){
  const levels = ["Absolute Beginner","A0","A1","A1.1","A2","B1","B2"];

  const dummyTemplates = [
    {
      id:"template-speaking-starter",
      title:"Template 1 — Speaking Starter",
      level:"Absolute Beginner",
      type:"template"
    },
    {
      id:"template-vocabulary-builder",
      title:"Template 2 — Vocabulary Builder",
      level:"Absolute Beginner",
      type:"template"
    },
    {
      id:"template-assessment-prep",
      title:"Template 3 — Assessment Prep",
      level:"Absolute Beginner",
      type:"template"
    }
  ];

  let loadedPlans = [];

  function cleanText(value){
    return String(value || "").replace(/\s+/g," ").trim();
  }

  function findFolderCards(){
    const all = Array.from(document.querySelectorAll("article, .card, .level-card, .folder, div, a"));
    const cards = [];

    levels.forEach(level=>{
      const match = all.find(el=>{
        const text = cleanText(el.textContent);
        if(!text) return false;
        if(!text.includes(level)) return false;
        if(!/lesson plan/i.test(text)) return false;

        const rect = el.getBoundingClientRect();
        return rect.width > 120 && rect.height > 40;
      });

      if(match && !cards.includes(match)){
        cards.push(match);
        match.dataset.lessonLevel = level;
      }
    });

    return cards;
  }

  function plansFor(level){
    return loadedPlans.filter(plan => cleanText(plan.level).toLowerCase() === cleanText(level).toLowerCase());
  }

  function normalizePlan(doc){
    const d = doc.data ? doc.data() : doc;

    return {
      id: doc.id || d.id || "",
      title: d.title || d.name || d.lessonTitle || "Untitled Lesson Plan",
      level: d.level || d.folder || d.cefrLevel || "Absolute Beginner",
      type: d.type || "saved",
      raw: d
    };
  }

  function updateCount(card, count){
    const candidates = Array.from(card.querySelectorAll("*")).filter(el =>
      /lesson plans/i.test(cleanText(el.textContent))
    );

    const countEl = candidates[candidates.length - 1];

    if(countEl){
      countEl.textContent = count + " lesson plans";
    }
  }

  function buildRollout(card, level){
    let panel = card.querySelector(".lesson-rollout-panel");

    if(!panel){
      panel = document.createElement("div");
      panel.className = "lesson-rollout-panel";
      panel.innerHTML = '<div class="lesson-rollout-inner"></div>';
      card.appendChild(panel);
    }

    const inner = panel.querySelector(".lesson-rollout-inner");
    inner.innerHTML = "";

    const plans = plansFor(level);
    updateCount(card, plans.length);

    if(plans.length === 0){
      inner.innerHTML = '<div class="lesson-rollout-empty">No saved lesson plans yet.</div>';
      return;
    }

    plans.forEach(plan=>{
      const row = document.createElement("div");
      row.className = "lesson-rollout-row";

      row.innerHTML = `
        <div class="lesson-rollout-title">${plan.title}</div>
        <button class="lesson-rollout-action view" type="button">View</button>
        <button class="lesson-rollout-action edit" type="button">Edit</button>
        <button class="lesson-rollout-action delete" type="button">Delete</button>
      `;

      row.querySelector(".view").onclick = function(e){
        e.stopPropagation();
        localStorage.setItem("impactSelectedLessonPlan", JSON.stringify(plan));
        window.location.href = "/teacher/lesson-plan-view.html";
      };

      row.querySelector(".edit").onclick = function(e){
        e.stopPropagation();
        localStorage.setItem("impactSelectedLessonPlan", JSON.stringify(plan));
        window.location.href = "/teacher/lesson-plan-builder.html";
      };

      row.querySelector(".delete").onclick = async function(e){
        e.stopPropagation();

        if(plan.type === "template"){
          alert("Template samples cannot be deleted.");
          return;
        }

        if(!confirm("Delete this lesson plan?")) return;

        try{
          if(window.firebase && firebase.firestore && plan.id){
            await firebase.firestore().collection("lessonPlans").doc(plan.id).delete();
          }
          await loadPlans();
        }catch(err){
          console.error(err);
          alert("Could not delete lesson plan.");
        }
      };

      inner.appendChild(row);
    });
  }

  function wireCards(){
    const cards = findFolderCards();

    cards.forEach(card=>{
      const level = card.dataset.lessonLevel;
      buildRollout(card, level);

      if(card.dataset.rolloutWired === "yes") return;
      card.dataset.rolloutWired = "yes";

      card.addEventListener("click", function(e){
        if(e.target.closest(".lesson-rollout-action")) return;

        const isOpen = card.classList.contains("lesson-folder-open");

        document.querySelectorAll(".lesson-folder-open").forEach(openCard=>{
          if(openCard !== card) openCard.classList.remove("lesson-folder-open");
        });

        card.classList.toggle("lesson-folder-open", !isOpen);
      });
    });
  }

  async function loadPlans(){
    loadedPlans = [...dummyTemplates];

    try{
      if(window.firebase && firebase.firestore){
        const snap = await firebase.firestore().collection("lessonPlans").get();
        snap.forEach(doc => loadedPlans.push(normalizePlan(doc)));
      }
    }catch(err){
      console.warn("Lesson plans Firestore load skipped:", err);
    }

    wireCards();
  }

  setTimeout(loadPlans, 400);
  setTimeout(wireCards, 1200);
})();
</script>
</body>
</html>
