<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lesson Plans | Impact</title>

<link href="https://fonts.googleapis.com/css2?family=Sorts+Mill+Goudy&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#05060b;
  color:white;
  font-family:Inter;
}

.page{
  width:92%;
  margin:auto;
  padding-top:100px;
}

h1{
  font-family:"Sorts Mill Goudy";
  font-size:60px;
  text-align:center;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  margin-top:40px;
}

.card{
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.15);
  cursor:pointer;
}

.card h2{
  margin:0;
}

.rollout{
  display:none;
  margin-top:15px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,.05);
}

.card.open{
  grid-column:1/-1;
}

.card.open .rollout{
  display:block;
}

.lesson{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
}
</style>
</head>

<body>

<div class="page">

<h1>Lesson Plans</h1>

<div class="grid">

<div class="card" onclick="toggle(this)">
<h2>A1</h2>
<p>3 lesson plans</p>

<div class="rollout">

<div class="lesson">
<span>Template 1 — Speaking Starter</span>
<div>
<button>View</button>
<button>Edit</button>
<button>Delete</button>
</div>
</div>

<div class="lesson">
<span>Template 2 — Vocabulary Builder</span>
<div>
<button>View</button>
<button>Edit</button>
<button>Delete</button>
</div>
</div>

<div class="lesson">
<span>Template 3 — Assessment Prep</span>
<div>
<button>View</button>
<button>Edit</button>
<button>Delete</button>
</div>
</div>

</div>
</div>

</div>
</div>

<script>
function toggle(el){
document.querySelectorAll('.card').forEach(c=>{
if(c!==el)c.classList.remove('open');
});
el.classList.toggle('open');
}
</script>

</body>
</html>
