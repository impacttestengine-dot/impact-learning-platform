<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Lesson Plan Builder</title>

<style>
body{
  margin:0;
  font-family:Inter;
  background:#05060b;
  color:white;
}

.toolbar{
  display:flex;
  gap:10px;
  padding:16px;
  background:rgba(255,255,255,.05);
}

.slide{
  width:80%;
  margin:30px auto;
  height:400px;
  border-radius:20px;
  background:rgba(255,255,255,.08);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
}

</style>
</head>

<body>

<div class="toolbar">
<button onclick="addSlide()">Add Slide</button>
<button onclick="insertMedia()">Insert Media</button>
<button onclick="viewMode()">View Mode</button>
</div>

<div id="slides"></div>

<script>
let slides = []

function addSlide(){
  slides.push("New Slide")
  render()
}

function render(){
  document.getElementById("slides").innerHTML = slides.map(s=>`<div class="slide">${s}</div>`).join("")
}

function insertMedia(){
  alert("Upload / Google Search / Stock coming next phase")
}

function viewMode(){
  alert("Viewing slides mode")
}
</script>

</body>
</html>
