<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Class Tracker | Impact</title>

<link href="https://fonts.googleapis.com/css2?family=Sorts+Mill+Goudy&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/impact-global-bg.css">
<link rel="stylesheet" href="/css/impact-round-icons.css">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#05060b;color:#fff;font-family:Inter,system-ui,sans-serif}
.nav{position:fixed;top:24px;left:28px;z-index:99;display:flex;gap:12px}
.nav a{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;color:#fff;text-decoration:none;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.16);backdrop-filter:blur(18px)}
.page{position:relative;z-index:2;width:min(1120px,92vw);margin:0 auto;padding:118px 0 80px}
.hero{text-align:center;margin-bottom:34px}
.eyebrow{text-transform:uppercase;letter-spacing:.34em;font-size:.68rem;font-weight:900;color:rgba(235,240,255,.62);margin-bottom:12px}
h1{font-family:"Sorts Mill Goudy",Georgia,serif;font-size:clamp(3rem,6vw,5.2rem);font-weight:400;line-height:1}
.hero p{margin-top:12px;color:rgba(255,255,255,.68);font-weight:700}
.panel{border-radius:32px;background:rgba(255,255,255,.075);border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(22px);box-shadow:0 26px 80px rgba(0,0,0,.32),inset 0 1px 0 rgba(255,255,255,.08);padding:24px}
.search{width:100%;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.10);color:#fff;border-radius:18px;padding:14px 16px;font-weight:800;margin-bottom:18px}
.learner-card{margin-bottom:18px;padding:18px;border-radius:24px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10)}
.learner-card h2{font-family:"Sorts Mill Goudy",Georgia,serif;font-weight:400;font-size:1.8rem;margin-bottom:12px}
.session-row{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:start;padding:13px;border-radius:18px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.08);margin-bottom:10px}
.session-number{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:rgba(255,255,255,.12);font-weight:900}
.meta{color:rgba(255,255,255,.65);font-size:.76rem;font-weight:800;line-height:1.65}
.delete-log{border:none;border-radius:13px;padding:9px 12px;background:rgba(255,80,80,.14);color:#fff;font-weight:900;cursor:pointer}
.badge{display:inline-block;margin-top:7px;padding:6px 9px;border-radius:999px;background:rgba(255,255,255,.1);font-size:.7rem;font-weight:900}
.early{background:rgba(255,80,80,.16);color:#fecaca}
.empty{text-align:center;padding:34px;color:rgba(255,255,255,.62);font-weight:900}
button{transition:transform .15s ease, background .18s ease, box-shadow .18s ease}
button:hover{transform:translateY(-2px) scale(1.03);background:rgba(255,255,255,.18)!important;box-shadow:0 14px 34px rgba(0,0,0,.32)}
button:active{transform:scale(.94);opacity:.82}
</style>
</head>

<body>
<script src="/js/impact-global-bg.js"></script>

<nav class="nav">
  <a href="/teacher/dashboard.html" title="Dashboard">⌘</a>
  <a href="/teacher/classes.html" title="Back">←</a>
</nav>

<main class="page">
  <section class="hero">
    <p class="eyebrow">Teacher Workspace</p>
    <h1>Class Tracker</h1>
    <p>Class logs grouped by learner. Sessions are counted in repeating sets of 4.</p>
  </section>

  <section class="panel">
    <input class="search" id="searchInput" type="search" placeholder="Search learner, teacher, level, room, reason...">
    <div id="logList"><div class="empty">Loading class tracker...</div></div>
  </section>
</main>

<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>
<script src="/__/firebase/init.js"></script>

<script>
const db=firebase.firestore();
const logList=document.getElementById("logList");
const searchInput=document.getElementById("searchInput");
let logs=[];

function clean(v){return String(v||"").toLowerCase();}

function sessionNumber(index){
  return ((index % 4) + 1) + "/4";
}

function groupByLearner(items){
  const groups={};
  items.forEach(item=>{
    const key=item.learner || "Unnamed Learner";
    if(!groups[key]) groups[key]=[];
    groups[key].push(item);

groups[key].sort((a,b)=>{
  return new Date(a.startedAt || 0) - new Date(b.startedAt || 0);
});
  });
  return groups;
}

function render(items){
  if(!items.length){
    logList.innerHTML='<div class="empty">No class logs yet.</div>';
    return;
  }

  const groups=groupByLearner(items);
  logList.innerHTML="";

  Object.keys(groups).sort().forEach(name=>{
    const card=document.createElement("article");
    card.className="learner-card";
    card.innerHTML=`<h2>${name}</h2>`;

    groups[name].forEach((item,index)=>{
      const row=document.createElement("div");
      row.className="session-row";
      row.innerHTML=`
        <div class="session-number">${sessionNumber(index)}</div>
        <div>
          <div class="meta">Level: ${item.level || ""} · Session ${sessionNumber(index)} · Teacher: ${item.teacher || ""} · Room: ${item.meetRoom || ""}</div>
          <div class="meta">Started: ${item.startedAtText || ""}</div>
          <div class="meta">Ended: ${item.endedAtText || "Not ended"}</div>
          <div class="meta">Duration: ${item.minutesSpent || 0} minute(s)</div>
          ${
            item.earlyEnd
              ? `<span class="badge early">Ended early</span>
                 <div class="meta">Reason: ${item.earlyEndReason || ""}</div>
                 <div class="meta">Remark: ${item.earlyEndRemark || ""}</div>`
              : `<span class="badge">${item.status || "Logged"}</span>`
          }
        </div>
        <button class="delete-log" data-id="${item.id}">Delete</button>
      `;
      row.querySelector(".delete-log").onclick=()=>deleteLog(item.id);
      card.appendChild(row);
    });

    logList.appendChild(card);
  });
}

async function deleteLog(id){
  if(!confirm("Delete this class log permanently?")) return;
  await db.collection("classTracker").doc(id).delete();
  await load();
}

async function load(){
  const snap=await db.collection("classTracker").orderBy("startedAt","desc").get();
  logs=snap.docs.map(d=>({id:d.id,...d.data()}));
  render(logs);
}

searchInput.oninput=()=>{
  const q=clean(searchInput.value);
  if(!q){render(logs);return;}
  render(logs.filter(item=>clean([
    item.learner,item.teacher,item.level,item.meetRoom,item.status,
    item.earlyEndReason,item.earlyEndRemark,item.startedAtText,item.endedAtText
  ].join(" ")).includes(q)));
};

load();
</script>

<script id="team-meetings-menu-fix">
(function(){

  function injectTeamMeetings(){

    const menu =
      document.querySelector(".quick-menu") ||
      document.querySelector(".menu-dropdown") ||
      document.querySelector(".menu-panel") ||
      document.querySelector(".menu-links") ||
      document.querySelector(".dropdown-menu");

    if(!menu) return;

    if(document.getElementById("teamMeetingsMenuLink")) return;

    const recycleLink = Array.from(menu.querySelectorAll("a"))
      .find(a =>
        (a.textContent || "")
          .toLowerCase()
          .includes("recycle")
      );

    if(!recycleLink) return;

    const newLink = recycleLink.cloneNode(true);

    newLink.id = "teamMeetingsMenuLink";

    newLink.href = "/teacher/team-meetings.html";

    newLink.textContent = "Team Meetings";

    // REMOVE INLINE STYLES THAT CAUSED STATIC LOOK
    newLink.removeAttribute("style");

    // insert before recycle bin
    recycleLink.parentNode.insertBefore(newLink, recycleLink);

  }

  injectTeamMeetings();

  setInterval(injectTeamMeetings, 1500);

})();
</script>

</body>
</html>
