<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Class Tracker | Impact</title>

<link href="https://fonts.googleapis.com/css2?family=Sorts+Mill+Goudy&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/impact-global-bg.css">

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;max-width:100%;overflow-x:hidden} body{min-height:100vh;background:#05060b;color:white;font-family:Inter,sans-serif}
.page{position:relative;z-index:2;width:min(980px,88vw);max-width:980px;margin:0 auto;padding:110px 0 90px;overflow:hidden}
.nav{position:fixed;top:24px;left:28px;z-index:20;display:flex;gap:12px}
.nav a{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;color:white;text-decoration:none;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(18px)}
.pdf-btn{position:fixed!important;top:24px!important;right:28px!important;left:auto!important;z-index:999999!important;width:54px!important;height:54px!important;border-radius:18px!important;border:1px solid rgba(255,255,255,.18)!important;background:rgba(255,255,255,.10)!important;color:white!important;font-size:22px!important;cursor:pointer!important;backdrop-filter:blur(18px)!important}
.hero{text-align:center;margin-bottom:34px;width:100%;overflow:hidden}
.hero h1{font-family:"Sorts Mill Goudy",serif;font-size:clamp(3rem,6vw,5.6rem);font-weight:400}
.hero p{font-weight:800;color:rgba(255,255,255,.65)}
.search{width:100%;padding:16px 18px;border-radius:22px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:white;font-weight:800;margin-bottom:24px}
.learner{margin-bottom:30px}
.learner h2{font-family:"Sorts Mill Goudy",serif;font-size:2rem;font-weight:400;margin-bottom:14px}
.card{display:grid;grid-template-columns:64px minmax(0,1fr) auto;gap:16px;margin-bottom:14px;padding:20px;border-radius:28px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);width:100%;max-width:100%;overflow:hidden;align-items:start}
.pill{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;background:rgba(255,255,255,.1);font-weight:900}
.info{font-size:.84rem;font-weight:800;line-height:1.75;color:rgba(255,255,255,.82)}
.top{font-weight:900;color:white}
.status{display:inline-block;margin-top:10px;padding:7px 12px;border-radius:999px;background:rgba(255,255,255,.1);font-size:.72rem;font-weight:900}
.badge{display:inline-block;margin-top:10px;margin-left:8px;padding:7px 12px;border-radius:999px;font-size:.72rem;font-weight:900}
.badge-type{background:rgba(120,170,255,.18);color:#bcd4ff}
.badge-billable{background:rgba(80,220,140,.16);color:#9ef0bf}
.badge-nonbillable{background:rgba(255,120,120,.16);color:#ffb3b3}
.delete{border:none;border-radius:14px;padding:10px 16px;background:rgba(255,80,80,.14);color:white;font-weight:900;cursor:pointer;align-self:start;justify-self:end;width:auto;min-width:92px;height:44px;line-height:1;display:flex;align-items:center;justify-content:center}
.empty{padding:24px;border-radius:24px;background:rgba(255,255,255,.06);text-align:center;font-weight:800;color:rgba(255,255,255,.6)}
button{transition:.15s ease}
button:hover{transform:translateY(-2px) scale(1.03)}
button:active{transform:scale(.94);opacity:.8}
</style>
<style id="class-tracker-delete-layout-fix">
.card{
  grid-template-columns:64px minmax(0,1fr) 110px !important;
  align-items:start !important;
  overflow:hidden !important;
}
.info{
  min-width:0 !important;
  word-break:break-word !important;
  overflow-wrap:anywhere !important;
}
.delete{
  width:92px !important;
  height:42px !important;
  min-width:92px !important;
  padding:0 14px !important;
  display:flex !important;
  align-items:center !important;
  justify-content:center !important;
  justify-self:end !important;
  align-self:start !important;
  border-radius:14px !important;
  line-height:1 !important;
}
@media(max-width:700px){
  .card{
    grid-template-columns:48px 1fr !important;
  }
  .delete{
    grid-column:2 !important;
    justify-self:start !important;
    margin-top:10px !important;
  }
}
</style>
</head>

<body>
<script src="/js/impact-global-bg.js"></script>

<nav class="nav">
  <a href="/teacher/dashboard.html">⌘</a>
  <a href="/teacher/classes.html">←</a>
</nav>

<button id="pdfBtn" class="pdf-btn">📄</button>

<main class="page">
  <section class="hero">
    <h1>Class Tracker</h1>
    <p>Started classes, ended classes, duration, participation, and teacher remarks are logged here.</p>
  </section>

  <input id="search" class="search" placeholder="Search learner, teacher, level, room, remark...">
  <section id="wrap"><div class="empty">Loading class tracker...</div></section>
</main>

<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>
<script src="/__/firebase/init.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async()=>{
const db=firebase.firestore();
const wrap=document.getElementById("wrap");
const search=document.getElementById("search");
let allLogs=[];

function clean(v){return String(v||"").replace(/\s*minute\(s\)\s*$/i,"").trim()}
function ms(x){return new Date(x.startedAt||x.createdAt||x.loggedAt||0).getTime()||0}
function isBillable(x){
  if(typeof x.billable==="boolean") return x.billable;
  return x.status==="Completed";
}

async function load(){
  const snap=await db.collection("classTracker").get();
  const seen=new Set();

  allLogs=snap.docs.map(d=>({id:d.id,...d.data()}))
    .sort((a,b)=>ms(a)-ms(b))
    .filter(x=>{
      const key=[x.learner,x.startedAt||x.startedAtText,x.endedAt||x.endedAtText,x.meetRoom].join("|");
      if(seen.has(key)) return false;
      seen.add(key);
      return true;
    });

  render(allLogs);
}

function render(logs){
  if(!logs.length){wrap.innerHTML='<div class="empty">No tracker records found.</div>';return}

  const groups={};
  logs.forEach(x=>{
    const name=x.learner||"Unnamed Learner";
    if(!groups[name]) groups[name]=[];
    groups[name].push(x);
  });

  wrap.innerHTML="";

  Object.keys(groups).sort().forEach(name=>{
    const sec=document.createElement("section");
    sec.className="learner";
    sec.innerHTML=`<h2>${name}</h2>`;

    let billableCount=0;
    groups[name].sort((a,b)=>ms(a)-ms(b)).forEach((x)=>{
      const billable=isBillable(x);
      let session;
      if(billable){
        billableCount++;
        session=billableCount+"/4";
      }else{
        session="-/4";
      }
      const entryType=(x.entryType||"auto").toUpperCase();
      const card=document.createElement("article");
      card.className="card";
      card.innerHTML=`
        <div class="pill">${session}</div>
        <div class="info">
          <div class="top">Level: ${x.level||""} · Session ${session} · Teacher: ${x.teacher||""} · Room: ${x.meetRoom||""}</div>
          <div>Started: ${x.startedAtText||x.startedAt||""}</div>
          <div>Ended: ${x.endedAtText||x.endedAt||"Not ended"}</div>
          <div>Duration: ${x.minutesSpent||x.durationMinutes||0} minute(s)</div>
          ${x.lessonCompleted?`<div>Lesson completed: ${clean(x.lessonCompleted)}</div>`:""}
          ${x.lessonCanceled?`<div>Lesson canceled: ${clean(x.lessonCanceled)}</div>`:""}
          ${x.studentParticipation?`<div>Student participation: ${clean(x.studentParticipation)}</div>`:""}
          ${x.teacherRemarks?`<div>Remarks: ${clean(x.teacherRemarks)}</div>`:""}
          <span class="status">${x.status||"Logged"}</span>
          <span class="badge badge-type">${entryType}</span>
          <span class="badge ${billable?"badge-billable":"badge-nonbillable"}">${billable?"BILLABLE":"NON-BILLABLE"}</span>
        </div>
        <button class="delete">Delete</button>
      `;
      card.querySelector(".delete").onclick=async()=>{
        if(confirm("Delete this tracker record?")){
          await db.collection("classTracker").doc(x.id).delete();
          await load();
        }
      };
      sec.appendChild(card);
    });

    wrap.appendChild(sec);
  });
}

search.oninput=()=>render(allLogs.filter(x=>JSON.stringify(x).toLowerCase().includes(search.value.toLowerCase())));

document.getElementById("pdfBtn").onclick=()=>{
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF({orientation:"landscape",unit:"pt",format:"a4"});

  const margin=45;
  const top=80;
  const noW=42;
  const studentW=120;
  const dateW=62;
  const dateCols=10;
  const headerH=54;
  const rowH=82;

  const xNo=margin;
  const xStudent=xNo+noW;
  const xDates=xStudent+studentW;

  pdf.setFont("helvetica","bold");
  pdf.setFontSize(20);
  pdf.text("Billing Tracker", margin, 55);

  function cell(x,y,w,h,fill){
    pdf.setFillColor(fill[0],fill[1],fill[2]);
    pdf.setDrawColor(80,45,35);
    pdf.setLineWidth(.6);
    pdf.rect(x,y,w,h,"FD");
  }

  function centerText(txt,x,y,w,h,size){
    pdf.setFont("helvetica","bold");
    pdf.setFontSize(size);
    pdf.setTextColor(15,22,33);
    const lines=pdf.splitTextToSize(String(txt),w-8);
    const lineH=size+2;
    const total=lines.length*lineH;
    let yy=y+(h-total)/2+size;
    lines.forEach(line=>{
      pdf.text(line,x+w/2,yy,{align:"center"});
      yy+=lineH;
    });
  }

  cell(xNo,top,noW,headerH,[213,226,232]);
  cell(xStudent,top,studentW,headerH,[213,226,232]);
  cell(xDates,top,dateW*dateCols,headerH,[213,226,232]);

  centerText("NO.",xNo,top,noW,headerH,10);
  centerText("STUDENT",xStudent,top,studentW,headerH,10);
  centerText("CLASS DATES",xDates,top,dateW*dateCols,headerH,11);

  const grouped={};
  allLogs.forEach(x=>{
    const name=x.learner||"Student";
    const raw=x.startedAtText||x.startedAt||"";
    const date=String(raw).split(",")[0].trim();
    if(!date)return;
    if(!grouped[name])grouped[name]=[];
    if(!grouped[name].includes(date))grouped[name].push(date);
  });

  let y=top+headerH;
  let n=1;

  Object.keys(grouped).sort().forEach(name=>{
    if(y+rowH>540){
      pdf.addPage("a4","landscape");
      y=60;
      cell(xNo,y,noW,headerH,[213,226,232]);
      cell(xStudent,y,studentW,headerH,[213,226,232]);
      cell(xDates,y,dateW*dateCols,headerH,[213,226,232]);
      centerText("NO.",xNo,y,noW,headerH,10);
      centerText("STUDENT",xStudent,y,studentW,headerH,10);
      centerText("CLASS DATES",xDates,y,dateW*dateCols,headerH,11);
      y+=headerH;
    }

    const boxes=[];
    for(let i=0;i<grouped[name].length;i+=4){
      boxes.push(grouped[name].slice(i,i+4));
    }
    while(boxes.length<dateCols)boxes.push([]);

    cell(xNo,y,noW,rowH,[235,242,245]);
    cell(xStudent,y,studentW,rowH,[235,242,245]);

    pdf.setTextColor(20,25,35);
    pdf.setFont("helvetica","bold");
    pdf.setFontSize(9);
    pdf.text(String(n++),xNo+noW/2,y+18,{align:"center"});
    pdf.text(name,xStudent+10,y+18);

    boxes.slice(0,dateCols).forEach((dates,i)=>{
      const x=xDates+(i*dateW);
      cell(x,y,dateW,rowH,[235,242,245]);
      pdf.setFont("helvetica","normal");
      pdf.setFontSize(8);
      pdf.setTextColor(20,25,35);
      let yy=y+16;
      dates.forEach(d=>{
        pdf.text(d,x+6,yy);
        yy+=12;
      });
    });

    y+=rowH;
  });

  pdf.save("Impact_Billing_Tracker.pdf");
};
load();
});
</script>

<script src="/js/impact-route-guard.js?v=inactivity-1hr"></script>
</body>
</html>
