<script>
// ===== Manual Class Modal (bound immediately, independent of Firestore load) =====
(function(){
  const manualOverlay=document.getElementById("manualModalOverlay");
  const addManualBtn=document.getElementById("addManualBtn");
  const mCancel=document.getElementById("m_cancel");

  function openManualModal(){
    document.getElementById("m_learner").value="";
    document.getElementById("m_teacher").value="";
    document.getElementById("m_level").value="";
    document.getElementById("m_date").value="";
    document.getElementById("m_start").value="";
    document.getElementById("m_end").value="";
    document.getElementById("m_participation").value="";
    document.getElementById("m_platform").value="";
    document.getElementById("m_remarks").value="";
    document.getElementById("m_error").style.display="none";
    document.getElementById("m_learner_hint").style.display="none";

    document.body.appendChild(manualOverlay);
    manualOverlay.classList.add("open");
    document.body.classList.add("modal-locked");
    window.scrollTo(0,0);
  }

  function closeManualModal(){
    manualOverlay.classList.remove("open");
    document.body.classList.remove("modal-locked");
  }

  if(addManualBtn){
    addManualBtn.addEventListener("click",function(e){
      e.preventDefault();
      openManualModal();
    });
  }else{
    console.error("Add Class button not found in DOM");
  }

  if(mCancel){
    mCancel.addEventListener("click",function(e){
      e.preventDefault();
      closeManualModal();
    });
  }

  manualOverlay.addEventListener("click",function(e){
    if(e.target===manualOverlay) closeManualModal();
  });

  window.__closeManualModal=closeManualModal;
  window.__openManualModal=openManualModal;
})();
</script>

<script>
document.addEventListener("DOMContentLoaded", async()=>{
const db=firebase.firestore();
const wrap=document.getElementById("wrap");
const search=document.getElementById("search");
let allLogs=[];
let knownLearners=[];

const BILLABLE_MINUTES_THRESHOLD=20;

// TESTING MODE: start date is frozen at 04 June 2026.
// When testing is confirmed good, remove the line below and
// restore the if/else block that reads lastExportEndDate from Firestore.
const FIRST_BILLING_START=new Date(2026,5,4); // 04 June 2026

function clean(v){return String(v||"").replace(/\s*minute\(s\)\s*$/i,"").trim()}
function ms(x){return new Date(x.startedAt||x.createdAt||x.loggedAt||0).getTime()||0}

function isBillable(x){
  if(typeof x.billable==="boolean") return x.billable;

  const canceled=String(x.lessonCanceled||"").trim().toLowerCase()==="yes";
  if(canceled) return false;

  const completedField=String(x.lessonCompleted||"").trim().toLowerCase();
  if(completedField==="no") return false;

  if(x.status==="Completed") return true;

  if(x.status==="Ended"){
    const mins=Number(x.minutesSpent||x.durationMinutes||0);
    return mins>=BILLABLE_MINUTES_THRESHOLD;
  }

  return false;
}

function resolveLearnerName(typedName){
  const typedNorm=typedName.trim().toLowerCase().replace(/\s+/g," ");
  for(const known of knownLearners){
    const knownNorm=known.trim().toLowerCase().replace(/\s+/g," ");
    if(knownNorm===typedNorm) return known;
  }
  return typedName.trim();
}

function formatDateLong(d){
  const day=String(d.getDate()).padStart(2,"0");
  const month=d.toLocaleString("en-GB",{month:"long"});
  const year=d.getFullYear();
  return `${day} ${month} ${year}`;
}

async function load(){
  const snap=await db.collection("classTracker").get();
  const seen=new Set();

  allLogs=snap.docs.map(d=>({id:d.id,...d.data()}))
    .sort((a,b)=>ms(a)-ms(b))
    .filter(x=>{
      const key=[x.learner,x.startedAt||x.startedAtText,x.endedAt||x.endedAtText,x.meetRoom].join("|");
      if(seen.has(key)) return false;
      seen.add(key);
      return true;
    });

  const nameSet=new Set();
  allLogs.forEach(x=>{ if(x.learner) nameSet.add(x.learner); });
  knownLearners=Array.from(nameSet).sort();

  const datalist=document.getElementById("m_learner_list");
  if(datalist){
    datalist.innerHTML=knownLearners.map(n=>`<option value="${n.replace(/"/g,"&quot;")}">`).join("");
  }

  render(allLogs);
}

function render(logs){
  if(!logs.length){wrap.innerHTML='<div class="empty">No tracker records found.</div>';return}

  const groups={};
  logs.forEach(x=>{
    const name=x.learner||"Unnamed Learner";
    if(!groups[name]) groups[name]=[];
    groups[name].push(x);
  });

  wrap.innerHTML="";

  Object.keys(groups).sort().forEach(name=>{
    const sec=document.createElement("section");
    sec.className="learner";
    sec.innerHTML=`<h2>${name}</h2>`;

    let billableCount=0;
    groups[name].sort((a,b)=>ms(a)-ms(b)).forEach((x)=>{
      const billable=isBillable(x);
      let session;
      if(billable){
        billableCount++;
        session=billableCount+"/4";
      }else{
        session="-/4";
      }
      const entryType=(x.entryType||"auto").toUpperCase();
      const card=document.createElement("article");
      card.className="card";
      card.innerHTML=`
        <div class="pill">${session}</div>
        <div class="info">
          <div class="top">Level: ${x.level||""} · Session ${session} · Teacher: ${x.teacher||""} · Room: ${x.meetRoom||x.platform||""}</div>
          <div>Started: ${x.startedAtText||x.startedAt||""}</div>
          <div>Ended: ${x.endedAtText||x.endedAt||"Not ended"}</div>
          <div>Duration: ${x.minutesSpent||x.durationMinutes||0} minute(s)</div>
          ${x.lessonCompleted?`<div>Lesson completed: ${clean(x.lessonCompleted)}</div>`:""}
          ${x.lessonCanceled?`<div>Lesson canceled: ${clean(x.lessonCanceled)}</div>`:""}
          ${x.studentParticipation?`<div>Student participation: ${clean(x.studentParticipation)}</div>`:""}
          ${x.teacherRemarks?`<div>Remarks: ${clean(x.teacherRemarks)}</div>`:""}
          <span class="status">${x.status||"Logged"}</span>
          <span class="badge badge-type">${entryType}</span>
          <span class="badge ${billable?"badge-billable":"badge-nonbillable"}">${billable?"BILLABLE":"NON-BILLABLE"}</span>
        </div>
        <button class="delete">Delete</button>
      `;
      card.querySelector(".delete").onclick=async()=>{
        if(confirm("Delete this tracker record?")){
          await db.collection("classTracker").doc(x.id).delete();
          await load();
        }
      };
      sec.appendChild(card);
    });

    wrap.appendChild(sec);
  });
}

search.oninput=()=>render(allLogs.filter(x=>JSON.stringify(x).toLowerCase().includes(search.value.toLowerCase())));

document.getElementById("pdfBtn").onclick=async()=>{
  const pdfBtn=document.getElementById("pdfBtn");
  pdfBtn.disabled=true;

  try{
    const historyRef=db.collection("billingExportHistory").doc("lastExport");

    const today=new Date();

    // TESTING MODE: start date always frozen at 04 June 2026.
    // Remove this line and restore the if/else block below when
    // testing is confirmed and rolling dates should activate.
    const rangeStart=FIRST_BILLING_START;

    // ---- PRODUCTION DATE LOGIC (restore when testing is done) ----
    // const historySnap=await historyRef.get();
    // let rangeStart;
    // if(historySnap.exists && historySnap.data().lastExportEndDate){
    //   const lastEnd=new Date(historySnap.data().lastExportEndDate);
    //   rangeStart=new Date(lastEnd);
    //   rangeStart.setDate(rangeStart.getDate()+1);
    // }else{
    //   rangeStart=FIRST_BILLING_START;
    // }
    // ---------------------------------------------------------------

    const rangeStartLabel=formatDateLong(rangeStart);
    const rangeEndLabel=formatDateLong(today);
    const filename=`Billing Tracker from ${rangeStartLabel} to ${rangeEndLabel}.pdf`;

    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:"landscape",unit:"pt",format:"a4"});

    const margin=45;
    const top=80;
    const noW=42;
    const studentW=120;
    const dateW=62;
    const dateCols=10;
    const headerH=54;
    const rowH=82;

    const xNo=margin;
    const xStudent=xNo+noW;
    const xDates=xStudent+studentW;

    pdf.setFont("helvetica","bold");
    pdf.setFontSize(16);
    pdf.text(filename.replace(".pdf",""), margin, 55);

    function cell(x,y,w,h,fill){
      pdf.setFillColor(fill[0],fill[1],fill[2]);
      pdf.setDrawColor(80,45,35);
      pdf.setLineWidth(.6);
      pdf.rect(x,y,w,h,"FD");
    }

    function centerText(txt,x,y,w,h,size){
      pdf.setFont("helvetica","bold");
      pdf.setFontSize(size);
      pdf.setTextColor(15,22,33);
      const lines=pdf.splitTextToSize(String(txt),w-8);
      const lineH=size+2;
      const total=lines.length*lineH;
      let yy=y+(h-total)/2+size;
      lines.forEach(line=>{
        pdf.text(line,x+w/2,yy,{align:"center"});
        yy+=lineH;
      });
    }

    cell(xNo,top,noW,headerH,[213,226,232]);
    cell(xStudent,top,studentW,headerH,[213,226,232]);
    cell(xDates,top,dateW*dateCols,headerH,[213,226,232]);

    centerText("NO.",xNo,top,noW,headerH,10);
    centerText("STUDENT",xStudent,top,studentW,headerH,10);
    centerText("CLASS DATES",xDates,top,dateW*dateCols,headerH,11);

    const billableLogs=allLogs.filter(x=>isBillable(x));

    const grouped={};
    billableLogs.forEach(x=>{
      const name=x.learner||"Student";
      const raw=x.startedAtText||x.startedAt||"";
      const date=String(raw).split(",")[0].trim();
      if(!date)return;
      if(!grouped[name])grouped[name]=[];
      if(!grouped[name].includes(date))grouped[name].push(date);
    });

    let y=top+headerH;
    let n=1;

    Object.keys(grouped).sort().forEach(name=>{
      if(y+rowH>540){
        pdf.addPage("a4","landscape");
        y=60;
        cell(xNo,y,noW,headerH,[213,226,232]);
        cell(xStudent,y,studentW,headerH,[213,226,232]);
        cell(xDates,y,dateW*dateCols,headerH,[213,226,232]);
        centerText("NO.",xNo,y,noW,headerH,10);
        centerText("STUDENT",xStudent,y,studentW,headerH,10);
        centerText("CLASS DATES",xDates,y,dateW*dateCols,headerH,11);
        y+=headerH;
      }

      const boxes=[];
      for(let i=0;i<grouped[name].length;i+=4){
        boxes.push(grouped[name].slice(i,i+4));
      }
      while(boxes.length<dateCols)boxes.push([]);

      cell(xNo,y,noW,rowH,[235,242,245]);
      cell(xStudent,y,studentW,rowH,[235,242,245]);

      pdf.setTextColor(20,25,35);
      pdf.setFont("helvetica","bold");
      pdf.setFontSize(9);
      pdf.text(String(n++),xNo+noW/2,y+18,{align,"center"});
      pdf.text(name,xStudent+10,y+18);

      boxes.slice(0,dateCols).forEach((dates,i)=>{
        const x=xDates+(i*dateW);
        cell(x,y,dateW,rowH,[235,242,245]);
        pdf.setFont("helvetica","normal");
        pdf.setFontSize(8);
        pdf.setTextColor(20,25,35);
        let yy=y+16;
        dates.forEach(d=>{
          pdf.text(d,x+6,yy);
          yy+=12;
        });
      });

      y+=rowH;
    });

    pdf.save(filename);

    // Still write history to Firestore even in testing mode,
    // so the log is building up ready for when rolling dates activate.
    await historyRef.set({
      lastExportEndDate:today.toISOString(),
      lastExportEndDateLabel:rangeEndLabel,
      lastExportStartDateLabel:rangeStartLabel,
      lastExportFilename:filename,
      updatedAt:today.toISOString()
    });

  }catch(err){
    console.error(err);
    alert("Could not generate the Billing Tracker PDF. Please try again.");
  }finally{
    pdfBtn.disabled=false;
  }
};

const mLearnerInput=document.getElementById("m_learner");
const mLearnerHint=document.getElementById("m_learner_hint");
mLearnerInput.addEventListener("input",()=>{
  const typed=mLearnerInput.value.trim();
  if(!typed){ mLearnerHint.style.display="none"; return; }
  const matched=resolveLearnerName(typed);
  const typedNorm=typed.toLowerCase().replace(/\s+/g," ");
  const matchedNorm=matched.toLowerCase().replace(/\s+/g," ");
  mLearnerHint.style.display=(typedNorm===matchedNorm && knownLearners.includes(matched))?"block":"none";
});

const mSave=document.getElementById("m_save");
const mError=document.getElementById("m_error");

mSave.onclick=async()=>{
  const learnerTyped=document.getElementById("m_learner").value.trim();
  const teacher=document.getElementById("m_teacher").value.trim();
  const level=document.getElementById("m_level").value.trim();
  const date=document.getElementById("m_date").value;
  const startTime=document.getElementById("m_start").value;
  const endTime=document.getElementById("m_end").value;
  const participation=document.getElementById("m_participation").value.trim();
  const platform=document.getElementById("m_platform").value.trim();
  const remarks=document.getElementById("m_remarks").value.trim();

  if(!learnerTyped||!teacher||!date||!startTime||!endTime){
    mError.style.display="block";
    return;
  }
  mError.style.display="none";

  const learner=resolveLearnerName(learnerTyped);

  const startedAt=new Date(`${date}T${startTime}`);
  const endedAt=new Date(`${date}T${endTime}`);
  let minutesSpent=Math.round((endedAt-startedAt)/60000);
  if(minutesSpent<0) minutesSpent=0;

  mSave.disabled=true;
  mSave.innerText="Saving...";

  try{
    await db.collection("classTracker").add({
      learner,
      teacher,
      level,
      meetRoom:"",
      platform:platform||"",
      startedAt:startedAt.toISOString(),
      startedAtText:startedAt.toLocaleString(),
      endedAt:endedAt.toISOString(),
      endedAtText:endedAt.toLocaleString(),
      minutesSpent,
      lessonCompleted:"Yes",
      lessonCanceled:"No",
      studentParticipation:participation?`${participation}%`:"",
      teacherRemarks:remarks,
      entryType:"manual",
      billable:true,
      status:"Completed"
    });

    if(window.__closeManualModal) window.__closeManualModal();
    await load();
  }catch(err){
    console.error(err);
    alert("Could not save manual class. Please try again.");
  }finally{
    mSave.disabled=false;
    mSave.innerText="Save Class";
  }
};

load();
});
</script>
