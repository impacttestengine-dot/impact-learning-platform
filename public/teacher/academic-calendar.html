<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academic Calendar</title>

<!-- KEEP YOUR SYSTEM FILES -->
<link rel="stylesheet" href="/css/impact-global-bg.css">
<link rel="stylesheet" href="/css/impact-page-nav.css">

<style>
body{
  color:white;
}

/* ===== PAGE ===== */
.page{
  position:relative;
  z-index:2;
  padding:110px 40px 40px;
}

/* ===== HEADER ===== */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

.title{
  font-size:32px;
  font-weight:600;
}

/* ===== YEAR NAV ===== */
.year-nav{
  display:flex;
  align-items:center;
  gap:15px;
}

.year{
  font-size:22px;
}

.arrow{
  cursor:pointer;
  font-size:20px;
  opacity:0.7;
}
.arrow:hover{opacity:1;}

.edit{
  margin-left:20px;
  cursor:pointer;
}

/* ===== GLASS CONTAINER ===== */
.calendar{
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(25px);
  border-radius:24px;
  padding:20px;
  box-shadow:0 20px 80px rgba(0,0,0,0.6);
}

/* ===== SCROLL ===== */
.scroll{
  overflow-x:auto;
}

/* ===== GRID ===== */
.grid{
  display:grid;
  grid-template-columns:200px repeat(52, 1fr);
  min-width:1600px;
}

/* ===== LABELS ===== */
.label{
  padding:10px;
  font-size:14px;
  opacity:0.85;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

/* ===== MONTH ===== */
.month{
  text-align:center;
  font-size:12px;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.2);
  opacity:0.8;
}

/* ===== CELLS ===== */
.cell{
  height:30px;
  border-right:1px solid rgba(255,255,255,0.06);
  border-bottom:1px solid rgba(255,255,255,0.06);
}

.cell:hover{
  background: rgba(255,255,255,0.1);
  cursor:pointer;
}

/* ===== ROW COLORS ===== */
.phase{ color:#60a5fa; }
.event{ color:#34d399; }
.exam{ color:#fbbf24; }
.holiday{ color:#f87171; }

</style>
</head>

<body>

<!-- KEEP YOUR NAV -->
<script src="/js/impact-global-bg.js"></script>
<script src="/js/impact-page-nav.js"></script>

<div class="page">

  <div class="header">
    <div class="title">Academic Timeline</div>

    <div class="year-nav">
      <div class="arrow" onclick="changeYear(-1)">◀</div>
      <div class="year" id="year">2026</div>
      <div class="arrow" onclick="changeYear(1)">▶</div>
      <div class="edit">✏️</div>
    </div>
  </div>

  <div class="calendar">
    <div class="scroll">
      <div class="grid" id="grid"></div>
    </div>
  </div>

</div>

<script>
const grid = document.getElementById("grid");

function buildGrid(){

  grid.innerHTML = "";

  // MONTH HEADER
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  let header = "<div></div>";

  months.forEach(m=>{
    for(let i=0;i<4;i++){
      header += <div class="month"></div>;
    }
  });

  grid.innerHTML += header;

  // ROWS
  const rows = [
    {name:"Phase 1", cls:"phase"},
    {name:"Phase 2", cls:"phase"},
    {name:"Phase 3", cls:"phase"},
    {name:"Phase 4", cls:"phase"},
    {name:"Events", cls:"event"},
    {name:"Exams", cls:"exam"},
    {name:"Holidays", cls:"holiday"}
  ];

  rows.forEach(r=>{
    let rowHTML = <div class="label "></div>;

    for(let i=0;i<52;i++){
      rowHTML += <div class="cell"></div>;
    }

    grid.innerHTML += rowHTML;
  });
}

// YEAR SWITCH
function changeYear(dir){
  let el = document.getElementById("year");
  let y = parseInt(el.innerText);
  el.innerText = y + dir;
}

// INIT
buildGrid();

</script>

</body>
</html>
