<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academic Calendar</title>

<link rel="stylesheet" href="/css/impact-global-bg.css">
<link rel="stylesheet" href="/css/impact-page-nav.css">

<style>
body{color:white;}

.page{
  position:relative;
  z-index:2;
  padding:110px 40px 40px;
}

.header{
  display:flex;
  justify-content:space-between;
  margin-bottom:25px;
}

.title{font-size:32px;}

.year-nav{
  display:flex;
  align-items:center;
  gap:15px;
}

.calendar{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(25px);
  border-radius:24px;
  padding:20px;
  box-shadow:0 20px 80px rgba(0,0,0,0.6);
}

.scroll{overflow-x:auto;}

.grid{
  display:grid;
  grid-template-columns:200px repeat(52, 1fr);
  min-width:1600px;
  position:relative;
}

.label{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.cell{
  height:40px;
  border:1px solid rgba(255,255,255,0.05);
  position:relative;
}

.cell:hover{background:rgba(255,255,255,0.1);}

/* EVENT BLOCK */
.event-block{
  position:absolute;
  height:30px;
  border-radius:8px;
  padding:4px 8px;
  font-size:12px;
  display:flex;
  align-items:center;
  cursor:pointer;
  white-space:nowrap;
  overflow:hidden;
}

.phase{background:#3b82f6;}
.event{background:#10b981;}
.exam{background:#f59e0b;}
.holiday{background:#ef4444;}

</style>
</head>

<body>

<script src="/js/impact-global-bg.js"></script>
<script src="/js/impact-page-nav.js"></script>

<div class="page">

<div class="header">
<div class="title">Academic Timeline</div>

<div class="year-nav">
<div onclick="changeYear(-1)">◀</div>
<div id="year">2026</div>
<div onclick="changeYear(1)">▶</div>
</div>
</div>

<div class="calendar">
<div class="scroll">
<div class="grid" id="grid"></div>
</div>
</div>

</div>

<script>
const grid = document.getElementById("grid");

let events = JSON.parse(localStorage.getItem("calendarEvents") || "[]");

let isDragging = false;
let startCell = null;
let currentRow = null;

// BUILD GRID
function build(){
  grid.innerHTML = "";

  const rows = [
    {name:"Phase 1", type:"phase"},
    {name:"Phase 2", type:"phase"},
    {name:"Phase 3", type:"phase"},
    {name:"Phase 4", type:"phase"},
    {name:"Events", type:"event"},
    {name:"Exams", type:"exam"},
    {name:"Holidays", type:"holiday"}
  ];

  rows.forEach((row,rowIndex)=>{
    let label = document.createElement("div");
    label.className = "label";
    label.innerText = row.name;
    grid.appendChild(label);

    for(let i=0;i<52;i++){
      let cell = document.createElement("div");
      cell.className = "cell";
      cell.dataset.row = rowIndex;
      cell.dataset.col = i;

      cell.onmousedown = (e)=>{
        isDragging = true;
        startCell = i;
        currentRow = rowIndex;
      };

      cell.onmouseup = (e)=>{
        if(!isDragging) return;
        isDragging = false;

        let end = i;

        let title = prompt("Event name?");
        if(!title) return;

        let event = {
          row: currentRow,
          start: Math.min(startCell,end),
          end: Math.max(startCell,end),
          text: title,
          type: rows[currentRow].type
        };

        events.push(event);
        save();
        renderEvents();
      };

      grid.appendChild(cell);
    }
  });

  renderEvents();
}

// RENDER EVENTS
function renderEvents(){
  document.querySelectorAll(".event-block").forEach(e=>e.remove());

  events.forEach((ev,index)=>{
    let block = document.createElement("div");
    block.className = "event-block " + ev.type;

    block.innerText = ev.text;

    let cellWidth = grid.offsetWidth / 52;

    block.style.left = (200 + ev.start * cellWidth) + "px";
    block.style.top = (ev.row * 40 + 40) + "px";
    block.style.width = ((ev.end - ev.start + 1) * cellWidth - 4) + "px";

    block.onclick = ()=>{
      let action = confirm("Delete this event?");
      if(action){
        events.splice(index,1);
        save();
        renderEvents();
      }
    };

    grid.appendChild(block);
  });
}

// SAVE
function save(){
  localStorage.setItem("calendarEvents", JSON.stringify(events));
}

// YEAR
function changeYear(dir){
  let el = document.getElementById("year");
  el.innerText = parseInt(el.innerText) + dir;
}

// INIT
build();

</script>

</body>
</html>
