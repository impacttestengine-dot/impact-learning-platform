<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Activity Builder | Impact</title>
<link href="https://fonts.googleapis.com/css2?family=Sorts+Mill+Goudy&family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/impact-global-bg.css">
<link rel="stylesheet" href="/css/impact-page-nav.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#05060b;color:#fff;font-family:Inter,system-ui,sans-serif}
.page{position:relative;z-index:2;width:min(920px,92vw);margin:0 auto;padding:118px 0 80px}
.card{padding:34px;border-radius:34px;background:rgba(8,12,24,.72);border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(24px);box-shadow:0 30px 90px rgba(0,0,0,.42)}
.eyebrow{text-transform:uppercase;letter-spacing:.3em;color:rgba(232,216,166,.82);font-size:.68rem;font-weight:900;margin-bottom:14px}
h1{font-family:"Sorts Mill Goudy",Georgia,serif;font-size:clamp(3rem,6vw,5rem);font-weight:400;margin-bottom:16px}
p{color:rgba(255,255,255,.72);font-weight:700;line-height:1.65}
.actions{margin-top:24px;display:flex;gap:12px;flex-wrap:wrap}
.actions a,.actions button{min-height:48px;padding:0 18px;border-radius:16px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.10);color:#fff;font-weight:900;text-decoration:none;display:flex;align-items:center;justify-content:center;cursor:pointer}
</style>
<link rel="stylesheet" href="/css/impact-round-icons.css?v=001">
</head>
<body>
<main class="page">
  <section class="card">
    <p class="eyebrow">Teacher Workspace</p>
    <h1>Activity Builder</h1>
    <p>This workspace will build media-rich learner activities.</p>
    <div class="actions">
      <a href="/teacher/dashboard.html">Dashboard</a>
      <button type="button" onclick="history.back()">Back</button>
    </div>
  </section>
</main>
<script src="/js/impact-global-bg.js"></script>
<script src="/js/impact-page-nav.js"></script>
<script src="/js/impact-route-guard.js"></script>
<script src="/js/impact-task-menu-patch.js"></script><script src="/js/impact-round-icons.js?v=001"></script>
<script src="/js/impact-recycle-bin.js"></script>
</body>
</html>
