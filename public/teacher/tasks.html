<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tasks</title>
<script type="module" src="/js/firebase.js"></script>
<style>
body{background:#0f172a;color:white;font-family:system-ui;padding:30px}
.task{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #333}
.done{color:#22c55e}
.pending{color:#f59e0b}
</style>
</head>

<body>

<h2>Tasks</h2>
<div id="tasks"></div>

<script type="module">
import { db } from '/js/firebase.js'
import { collection, addDoc, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"

const el = document.getElementById('tasks')

async function load(){
  const snap = await getDocs(collection(db,"tasks"))

  el.innerHTML=""

  snap.forEach(d=>{
    const t=d.data()
    el.innerHTML += 
      <div class="task">
        <span></span>
        <button onclick="complete('')"></button>
      </div>
    
  })
}

window.complete = async (id)=>{
  await updateDoc(doc(db,"tasks",id),{done:true})
  load()
}

load()
</script>

</body>
</html>
