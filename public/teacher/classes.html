<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Classes | Impact</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Sorts+Mill+Goudy:ital@0;1&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/css/impact-global-bg.css">
<link rel="stylesheet" href="/css/impact-round-icons.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --glass:rgba(255,255,255,0.08);
  --line:rgba(255,255,255,0.12);
  --soft:rgba(255,255,255,0.65);
  --text:#ffffff;
}

body{
  min-height:100vh;
  background:#05060b;
  color:var(--text);
  font-family:"Inter",sans-serif;
  overflow-x:hidden;
}

.page{
  width:min(1180px,92vw);
  margin:auto;
  padding:110px 0 80px;
  position:relative;
  z-index:2;
}

.top-nav{
  position:fixed;
  top:22px;
  left:24px;
  z-index:1000;
}

.top-nav a{
  width:48px;
  height:48px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  color:white;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.14);
  backdrop-filter:blur(18px);
  font-size:1.15rem;
}

.hero{
  text-align:center;
  margin-bottom:34px;
}

.hero-tag{
  text-transform:uppercase;
  letter-spacing:0.35em;
  font-size:0.72rem;
  font-weight:800;
  color:rgba(255,255,255,0.6);
  margin-bottom:14px;
}

.hero h1{
  font-family:"Sorts Mill Goudy",serif;
  font-size:clamp(3.5rem,6vw,5.8rem);
  font-weight:400;
  line-height:1;
}

.tracker-link{
  display:inline-block;
  margin-top:12px;
  color:#dbeafe;
  font-weight:700;
  font-size:0.95rem;
  text-decoration:none;
  border-bottom:1px solid rgba(219,234,254,0.4);
}

.layout{
  display:grid;
  grid-template-columns:1fr 1.08fr;
  gap:22px;
  align-items:start;
}

.panel{
  background:var(--glass);
  border:1px solid var(--line);
  border-radius:34px;
  padding:26px;
  backdrop-filter:blur(24px);
  box-shadow:0 24px 80px rgba(0,0,0,0.32), inset 0 1px 0 rgba(255,255,255,0.05);
}

.panel-title{
  font-family:"Sorts Mill Goudy",serif;
  font-size:2.1rem;
  margin-bottom:8px;
}

.panel-sub{
  font-size:0.83rem;
  color:var(--soft);
  font-weight:700;
  margin-bottom:22px;
}

.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.field{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.field.full{
  grid-column:1/-1;
}

.field label{
  font-size:0.82rem;
  font-weight:800;
  color:rgba(255,255,255,0.8);
}

input,
select,
textarea{
  width:100%;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.1);
  color:white;
  border-radius:18px;
  padding:14px 15px;
  font-size:0.94rem;
  font-weight:700;
}

textarea{
  min-height:100px;
  resize:vertical;
}

select option{
  color:#111827;
}

input::placeholder,
textarea::placeholder{
  color:rgba(255,255,255,0.35);
}

.room-note{
  grid-column:1/-1;
  margin-top:-3px;
  color:rgba(255,255,255,0.45);
  font-size:0.73rem;
  font-weight:700;
}

.save-btn{
  grid-column:1/-1;
  border:none;
  cursor:pointer;
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.12);
  min-height:54px;
  border-radius:18px;
  color:white;
  font-weight:900;
  font-size:0.94rem;
  transition:0.25s ease;
}

.save-btn:hover{
  background:rgba(255,255,255,0.18);
}

.save-status{
  grid-column:1/-1;
  text-align:center;
  min-height:22px;
  color:#d9f99d;
  font-weight:800;
  font-size:0.82rem;
}

.list-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  margin-bottom:16px;
}

.class-count{
  color:rgba(255,255,255,0.72);
  font-size:0.82rem;
  font-weight:900;
}

.class-list{
  display:grid;
  gap:14px;
}

.class-card{
  border-radius:24px;
  padding:18px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  display:grid;
  grid-template-columns:1fr auto;
  gap:14px;
  align-items:center;
}

.class-card h3{
  font-size:1rem;
  font-weight:900;
  margin-bottom:8px;
}

.class-meta{
  font-size:0.78rem;
  color:rgba(255,255,255,0.58);
  font-weight:700;
  line-height:1.7;
}

.class-actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  justify-content:flex-end;
}

.class-actions a,
.class-actions button{
  border:none;
  cursor:pointer;
  text-decoration:none;
  color:white;
  background:rgba(255,255,255,0.09);
  border:1px solid rgba(255,255,255,0.1);
  padding:10px 13px;
  border-radius:14px;
  font-size:0.76rem;
  font-weight:900;
}

.empty{
  border-radius:22px;
  padding:26px;
  background:rgba(255,255,255,0.05);
  text-align:center;
  color:rgba(255,255,255,0.55);
  font-weight:800;
}

.unavailable{
  color:rgba(255,255,255,0.45);
}

@media(max-width:980px){
  .layout{grid-template-columns:1fr}
}

@media(max-width:700px){
  .form-grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<script src="/js/impact-global-bg.js"></script>

<div class="top-nav">
  <a href="/teacher/dashboard.html">⌘</a>
</div>

<main class="page">

  <section class="hero">
    <div class="hero-tag">TEACHER WORKSPACE</div>
    <h1>Classes</h1>
    <a class="tracker-link" href="/teacher/class-logger.html">Class Tracker</a>
  </section>

  <section class="layout">

    <section class="panel">
      <h2 class="panel-title">Schedule Class</h2>
      <p class="panel-sub">Create an upcoming online class session.</p>

      <form id="classForm">
        <div class="form-grid">

          <div class="field">
            <label>Level</label>
            <input id="level" type="text" placeholder="A0">
          </div>

          <div class="field">
            <label>Learner</label>
            <input id="learner" type="text" placeholder="Learner name">
          </div>

          <div class="field">
            <label>Teacher</label>
            <input id="teacher" type="text" placeholder="Teacher name">
          </div>

          <div class="field">
            <label>Day</label>
            <select id="day" required>
              <option value="">Select Day</option>
              <option>Monday</option>
              <option>Tuesday</option>
              <option>Wednesday</option>
              <option>Thursday</option>
              <option>Friday</option>
              <option>Saturday</option>
              <option>Sunday</option>
            </select>
          </div>

          <div class="field">
            <label>Time</label>
            <input id="time" type="time" required>
          </div>

          <div class="field">
            <label>Duration</label>
            <input id="duration" type="text" placeholder="1 hour">
          </div>

          <div class="field full">
            <label>Google Meet Room</label>
            <select id="meetRoom" required>
              <option value="">Select Google Meet Room</option>
              <option value="Impact Meet Room 1" data-url="https://meet.google.com/">Impact Meet Room 1</option>
              <option value="Impact Meet Room 2" data-url="https://meet.google.com/">Impact Meet Room 2</option>
              <option value="Impact Meet Room 3" data-url="https://meet.google.com/">Impact Meet Room 3</option>
            </select>
          </div>

          <div class="room-note" id="roomNote">Select a day and time to see unavailable meet rooms.</div>

          <div class="field">
            <label>Status</label>
            <select id="status">
              <option>Scheduled</option>
              <option>Completed</option>
              <option>Cancelled</option>
            </select>
          </div>

          <div class="field full">
            <label>Class Notes</label>
            <textarea id="notes" placeholder="Optional notes"></textarea>
          </div>

          <button class="save-btn" type="submit">Save Class</button>
          <div class="save-status" id="saveStatus"></div>

        </div>
      </form>
    </section>

    <section class="panel">
      <div class="list-top">
        <div>
          <h2 class="panel-title">Scheduled Classes</h2>
          <p class="panel-sub">All saved classes appear here.</p>
        </div>

        <div class="class-count" id="classCount">0 classes</div>
      </div>

      <div class="class-list" id="classList">
        <div class="empty">Loading classes...</div>
      </div>
    </section>

  </section>
</main>

<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>
<script src="/__/firebase/init.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  const db = firebase.firestore();

  const form = document.getElementById("classForm");

  const level = document.getElementById("level");
  const learner = document.getElementById("learner");
  const teacher = document.getElementById("teacher");
  const day = document.getElementById("day");
  const time = document.getElementById("time");
  const duration = document.getElementById("duration");
  const meetRoom = document.getElementById("meetRoom");
  const status = document.getElementById("status");
  const notes = document.getElementById("notes");

  const roomNote = document.getElementById("roomNote");
  const saveStatus = document.getElementById("saveStatus");

  const classList = document.getElementById("classList");
  const classCount = document.getElementById("classCount");

  let allClasses = [];
  let editingId = null;

  function cleanText(text){
    return String(text || "").replace(/\s+— unavailable.*$/i,"").trim();
  }

  function getRoomURL(){
    const option = meetRoom.options[meetRoom.selectedIndex];
    return option?.dataset?.url || "#";
  }

  async function loadClasses(){
    classList.innerHTML = '<div class="empty">Loading classes...</div>';

    const snapshot = await db.collection("classes").orderBy("createdAt","desc").get();

    allClasses = snapshot.docs.map(doc => ({
      id:doc.id,
      ...doc.data()
    }));

    renderClasses();
    refreshRoomAvailability();
  }

  function renderClasses(){
    classCount.textContent = allClasses.length + (allClasses.length === 1 ? " class" : " classes");

    if(!allClasses.length){
      classList.innerHTML = '<div class="empty">No classes scheduled yet.</div>';
      return;
    }

    classList.innerHTML = "";

    allClasses.forEach(item => {
      const card = document.createElement("div");
      card.className = "class-card";

      card.innerHTML = `
        <div>
          <h3>${item.learner || "Unnamed Learner"} — ${item.level || "No level"}</h3>
          <div class="class-meta">${item.day || ""} · ${item.time || ""} · ${item.duration || ""}</div>
          <div class="class-meta">${item.teacher || ""} · ${item.meetRoom || ""} · ${item.status || ""}</div>
        </div>

        <div class="class-actions">
          <a href="${item.meetUrl || '#'}" target="_blank">Open Meet</a>
          <button data-edit="${item.id}">Edit</button>
          <button data-delete="${item.id}">Delete</button>
        </div>
      `;

      card.querySelector("[data-edit]").onclick = () => editClass(item);
      card.querySelector("[data-delete]").onclick = () => deleteClass(item);

      classList.appendChild(card);
    });
  }

  function editClass(item){
    editingId = item.id;

    level.value = item.level || "";
    learner.value = item.learner || "";
    teacher.value = item.teacher || "";
    day.value = item.day || "";
    time.value = item.time || "";
    duration.value = item.duration || "";
    status.value = item.status || "Scheduled";
    notes.value = item.notes || "";

    Array.from(meetRoom.options).forEach(option => {
      if(cleanText(option.value) === item.meetRoom){
        meetRoom.value = option.value;
      }
    });

    refreshRoomAvailability();
    saveStatus.textContent = "Editing selected class";
  }

  async function deleteClass(item){
    await db.collection("classes").doc(item.id).delete();
    await loadClasses();
  }

  function refreshRoomAvailability(){
    const selectedDay = day.value;
    const selectedTime = time.value;

    Array.from(meetRoom.options).forEach(option => {
      if(!option.value) return;

      const baseText = cleanText(option.textContent);

      option.textContent = baseText;
      option.disabled = false;
      option.classList.remove("unavailable");

      if(!selectedDay || !selectedTime) return;

      const unavailable = allClasses.some(classItem => {
        return (
          classItem.id !== editingId &&
          classItem.day === selectedDay &&
          classItem.time === selectedTime &&
          classItem.meetRoom === option.value &&
          classItem.status !== "Cancelled"
        );
      });

      if(unavailable){
        option.disabled = true;
        option.classList.add("unavailable");
        option.textContent = baseText + " — unavailable at selected day and time";
      }
    });

    roomNote.textContent = selectedDay && selectedTime
      ? "Unavailable rooms are greyed out for the selected day and time."
      : "Select a day and time to see unavailable meet rooms.";
  }

  async function saveClass(event){
    event.preventDefault();

    refreshRoomAvailability();

    const selectedOption = meetRoom.options[meetRoom.selectedIndex];

    if(!selectedOption || !meetRoom.value){
      saveStatus.textContent = "Please select a Google Meet room.";
      return;
    }

    if(selectedOption.disabled){
      saveStatus.textContent = "This room is unavailable at the selected day and time.";
      return;
    }

    const now = new Date();

    const data = {
      level:level.value.trim(),
      learner:learner.value.trim(),
      teacher:teacher.value.trim(),
      day:day.value,
      time:time.value,
      duration:duration.value.trim(),
      meetRoom:meetRoom.value,
      meetUrl:getRoomURL(),
      status:status.value,
      notes:notes.value.trim(),
      updatedAt:now.toISOString(),
      updatedAtText:now.toLocaleString()
    };

    if(editingId){
      await db.collection("classes").doc(editingId).set(data,{ merge:true });
    }else{
      await db.collection("classes").add({
        ...data,
        createdAt:now.toISOString(),
        createdAtText:now.toLocaleString()
      });
    }

    form.reset();
    editingId = null;
    saveStatus.textContent = "Saved ✓";

    await loadClasses();

    setTimeout(() => {
      saveStatus.textContent = "";
    },1600);
  }

  form.addEventListener("submit", saveClass);

  day.addEventListener("change", refreshRoomAvailability);
  time.addEventListener("change", refreshRoomAvailability);
  meetRoom.addEventListener("mousedown", refreshRoomAvailability);
  meetRoom.addEventListener("focus", refreshRoomAvailability);

  await loadClasses();
});
</script>

</body>
</html>
