<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Placement Test Builder | Impact</title>
<link href="https://fonts.googleapis.com/css2?family=Sorts+Mill+Goudy&family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/impact-global-bg.css">
<link rel="stylesheet" href="/teacher/placements/placements.css">
</head>
<body>
<script src="/js/impact-global-bg.js"></script>

<nav class="lp-nav">
  <a class="lp-icon-btn" href="/teacher/dashboard.html" title="Dashboard"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="7" height="7" rx="2"/><rect x="13" y="4" width="7" height="7" rx="2"/><rect x="4" y="13" width="7" height="7" rx="2"/><rect x="13" y="13" width="7" height="7" rx="2"/></svg></a>
  <a class="lp-icon-btn" href="/teacher/placements/tests.html" title="Back"><svg viewBox="0 0 24 24"><path d="M15 5.5 8.5 12 15 18.5"/><path d="M9 12h11"/></svg></a>
</nav>

<main class="page">
  <section class="hero">
    <p class="eyebrow">Assessment Builder</p>
    <h1>Placement Test Builder</h1>
    <p>Build placement tests using listening, reading, writing, and speaking blocks.</p>
  </section>

  <section class="builder-layout">
    <aside class="panel" style="padding:22px">
      <div class="block-list">
        <button data-type="instruction">Instruction</button>
        <button data-type="listening">Listening</button>
        <button data-type="reading">Reading</button>
        <button data-type="writing">Writing</button>
        <button data-type="speaking">Speaking</button>
      </div>
    </aside>

    <section class="panel" style="padding:18px">
      <div class="canvas" id="canvas"><div class="empty">Add test blocks from the left.</div></div>
    </section>

    <aside class="panel" style="padding:22px">
      <div class="settings-stack">
        <input id="title" placeholder="Test title">
        <select id="target">
          <option>A0 → A1</option>
          <option>A1 → A2</option>
          <option>A2 → B1</option>
          <option>B1 → B2</option>
          <option>Full Level Detection</option>
        </select>
        <button id="newBtn">New</button>
        <button id="saveBtn">Save</button>
        <button id="viewBtn">View</button>
      </div>
    </aside>
  </section>
</main>

<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>
<script src="/__/firebase/init.js"></script>
<script>
const db=firebase.firestore();
const canvas=document.getElementById("canvas");
const params=new URLSearchParams(location.search);
let currentId=params.get("edit") || "";
let blocks=[];

const templates={
  instruction:{title:"Instruction",body:"Write learner instructions here..."},
  listening:{title:"Listening Section",body:"Audio file name:\nAudio script:\nQuestions:\n1.\n2.\n3."},
  reading:{title:"Reading Section",body:"Reading text:\nQuestions:\n1.\n2.\n3."},
  writing:{title:"Writing Section",body:"Writing prompt:\nExpected learner response:"},
  speaking:{title:"Speaking Section",body:"Teacher prompt:\nExpected speaking target:"}
};

function render(){
  canvas.innerHTML="";
  if(!blocks.length){
    canvas.innerHTML='<div class="empty">Add test blocks from the left.</div>';
    return;
  }
  blocks.forEach((b,i)=>{
    const card=document.createElement("article");
    card.className="builder-block";
    card.innerHTML=`<button class="delete-block" data-i="${i}">×</button><h2>${b.title}</h2><textarea data-i="${i}">${b.body}</textarea>`;
    canvas.appendChild(card);
  });
  canvas.querySelectorAll("textarea").forEach(t=>t.oninput=()=>{blocks[Number(t.dataset.i)].body=t.value;autosave();});
  canvas.querySelectorAll(".delete-block").forEach(btn=>btn.onclick=()=>{blocks.splice(Number(btn.dataset.i),1);render();autosave();});
}

document.querySelectorAll("[data-type]").forEach(btn=>{
  btn.onclick=()=>{blocks.push({...templates[btn.dataset.type]});render();autosave();};
});

async function save(){
  const payload={
    title:document.getElementById("title").value.trim() || "Untitled Placement Test",
    target:document.getElementById("target").value,
    blocks,
    updatedAt:new Date().toISOString()
  };
  if(currentId){
    await db.collection("placementTests").doc(currentId).set(payload,{merge:true});
  }else{
    const ref=await db.collection("placementTests").add(payload);
    currentId=ref.id;
  }
}

let timer=null;
function autosave(){clearTimeout(timer);timer=setTimeout(save,900);}
document.getElementById("title").oninput=autosave;
document.getElementById("target").onchange=autosave;
document.getElementById("saveBtn").onclick=save;
document.getElementById("newBtn").onclick=()=>{currentId="";blocks=[];document.getElementById("title").value="";render();};
document.getElementById("viewBtn").onclick=async()=>{await save();location.href="/teacher/placements/view-test.html?id="+currentId;};

async function load(){
  if(!currentId){render();return;}
  const doc=await db.collection("placementTests").doc(currentId).get();
  if(doc.exists){
    const d=doc.data();
    document.getElementById("title").value=d.title||"";
    document.getElementById("target").value=d.target||"Full Level Detection";
    blocks=d.blocks||[];
  }
  render();
}
load();
</script>
</body>
</html>
