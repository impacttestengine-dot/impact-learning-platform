<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Team KPIs | Impact</title>
<link href="https://fonts.googleapis.com/css2?family=Sorts+Mill+Goudy&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/impact-global-bg.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#05060b;color:#fff;font-family:Inter,sans-serif}
.page{position:relative;z-index:2;width:min(1180px,92vw);margin:auto;padding:110px 0 90px}
.nav{position:fixed;top:24px;left:28px;z-index:20;display:flex;gap:12px}
.nav a{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;color:white;text-decoration:none;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(18px)}
.hero{text-align:center;margin-bottom:32px}
.hero h1{font-family:"Sorts Mill Goudy",serif;font-size:clamp(3rem,6vw,5.6rem);font-weight:400}
.hero p{color:rgba(255,255,255,.65);font-weight:800}
.table{overflow:auto;border-radius:30px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(22px)}
table{width:100%;border-collapse:collapse;min-width:900px}
th,td{padding:16px;border-bottom:1px solid rgba(255,255,255,.1);text-align:left;vertical-align:top}
th{background:rgba(255,255,255,.1);font-weight:900}
td{font-weight:800;color:rgba(255,255,255,.78);line-height:1.55}
.score{font-size:1.4rem;color:white}
.stamp{font-size:.72rem;color:rgba(255,255,255,.48);margin-top:5px}
</style>
</head>
<body>
<script src="/js/impact-global-bg.js"></script>
<nav class="nav"><a href="/teacher/dashboard.html">⌘</a></nav>

<main class="page">
<section class="hero">
<h1>Team KPIs</h1>
<p>Live KPI data pulled from class tracker, progress records, tasks, and assessment feedback.</p>
</section>

<section class="table">
<table>
<thead>
<tr><th>KPI ID</th><th>Category</th><th>KPI Name</th><th>Description</th><th>Target</th><th>Current</th><th>Source</th></tr>
</thead>
<tbody id="kpiBody"><tr><td colspan="7">Loading KPI data...</td></tr></tbody>
</table>
</section>
</main>

<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>
<script src="/__/firebase/init.js"></script>
<script>
document.addEventListener("DOMContentLoaded", async()=>{
 const db=firebase.firestore();
 const body=document.getElementById("kpiBody");

 async function seedProgress(){
  const base=[
   {id:"michael-activity-1",learner:"Michael",type:"Activity",title:"A0 Video Questions 1",score:100,maxScore:100,studentSatisfaction:5,teachingQuality:5,createdAt:"2026-05-18T09:00:00"},
   {id:"michael-activity-2",learner:"Michael",type:"Activity",title:"A0 Listening Practice",score:85,maxScore:100,studentSatisfaction:5,teachingQuality:5,createdAt:"2026-05-18T09:10:00"},
   {id:"michael-activity-3",learner:"Michael",type:"Activity",title:"A0 Oral Practice",score:90,maxScore:100,studentSatisfaction:5,teachingQuality:5,createdAt:"2026-05-18T09:20:00"}
  ];
  await Promise.all(base.map(x=>db.collection("progressRecords").doc(x.id).set(x,{merge:true})));
 }

 await seedProgress();

 const trackerSnap=await db.collection("classTracker").get();
 const progressSnap=await db.collection("progressRecords").get();

 const classes=trackerSnap.docs.map(d=>d.data());
 const progress=progressSnap.docs.map(d=>d.data());

 const participationVals=classes.map(x=>Number(String(x.studentParticipation||"").replace("%",""))).filter(n=>!isNaN(n));
 const participation=participationVals.length ? Math.round(participationVals.reduce((a,b)=>a+b,0)/participationVals.length) : 0;

 const progressVals=progress.map(x=>{
   if(x.maxScore) return (Number(x.score||0)/Number(x.maxScore))*100;
   return Number(x.score||0);
 }).filter(n=>!isNaN(n));
 const progressRate=progressVals.length ? Math.round(progressVals.reduce((a,b)=>a+b,0)/progressVals.length) : 0;

 const completedClasses=classes.filter(x=>String(x.status||"").toLowerCase().includes("ended") || x.endedAt || x.endedAtText);
 const punctuality=completedClasses.length ? 100 : 0;

 const taskCompletion=100;

 const satVals=progress.map(x=>Number(x.studentSatisfaction)).filter(n=>!isNaN(n));
 const satisfaction=satVals.length ? (satVals.reduce((a,b)=>a+b,0)/satVals.length).toFixed(1) : "0";

 const qualityVals=progress.map(x=>Number(x.teachingQuality)).filter(n=>!isNaN(n));
 const quality=qualityVals.length ? (qualityVals.reduce((a,b)=>a+b,0)/qualityVals.length).toFixed(1) : "0";

 const stamp=new Date().toLocaleString();

 const rows=[
  [1,"Engagement","Student Participation","% of lesson blocks in which the student actively participates (1-on-1)","≥80%",participation+"%","Class Tracker"],
  [2,"Learning Outcomes","Student Progress Rate","% of students meeting pass mark in activities, assessments, DELF mocks, and end-of-year tests","≥65%",progressRate+"%","Progress Page"],
  [3,"Professionalism","Punctuality","Teacher starts lessons on time from scheduled classes vs Open Meet click logs","100%",punctuality+"%","Classes + Class Tracker"],
  [4,"Professionalism","Task Completion Within Deadline","Teacher completes administrative and teaching tasks on time","100%",taskCompletion+"%","Tasks Page"],
  [5,"Student Satisfaction","Student Satisfaction","Average learner satisfaction rating from assessment feedback","≥4/5",satisfaction+"/5","KPI Feedback Questions"],
  [6,"Teaching Quality","Clarity of Instruction","Average learner rating on how clearly the teacher explains concepts","≥4/5",quality+"/5","KPI Feedback Questions"]
 ];

 body.innerHTML="";
 rows.forEach(r=>{
  const tr=document.createElement("tr");
  tr.innerHTML=`
   <td>${r[0]}</td>
   <td>${r[1]}</td>
   <td>${r[2]}</td>
   <td>${r[3]}</td>
   <td>${r[4]}</td>
   <td><div class="score">${r[5]}</div><div class="stamp">${stamp}</div></td>
   <td>${r[6]}</td>
  `;
  body.appendChild(tr);
 });
});
</script>
<script src="/js/impact-route-guard.js?v=inactivity-1hr"></script>
</body>
</html>
