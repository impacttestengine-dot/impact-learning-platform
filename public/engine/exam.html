<!DOCTYPE html>
<html>
<head>
  <title>Exam Engine</title>
  <link rel="stylesheet" href="/css/impact-global-bg.css?v=blur-bg-logo-clean-001">
  <link rel="stylesheet" href="/css/impact-page-nav.css?v=nav-global-001">
</head>
<body>

<h1 id="title">Loading exam...</h1>
<div id="content"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { firebaseConfig } from "../js/firebase-config.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const code = params.get("code");

async function loadExam(){

  const q = query(collection(db, "examTemplates"), where("code", "==", code));
  const snap = await getDocs(q);

  if(snap.empty){
    document.getElementById("title").innerText = "Invalid exam code";
    return;
  }

  const exam = snap.docs[0].data();
  document.getElementById("title").innerText = exam.title;

  document.getElementById("content").innerHTML =
    "<p>Level: " + exam.level + "</p>" +
    "<p>Sections loading...</p>";
}

loadExam();

</script>
  <script src="/js/impact-global-bg.js?v=blur-bg-logo-clean-001"></script>
  <script src="/js/impact-page-nav.js?v=nav-global-001"></script>
</body>
</html>
